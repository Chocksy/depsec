<svg xmlns="http://www.w3.org/2000/svg" width="540" height="320" viewBox="0 0 540 320">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#0c0e14"/>
      <stop offset="100%" stop-color="#13151d"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="540" height="320" rx="12" fill="url(#bg)"/>
  <rect width="540" height="320" rx="12" fill="none" stroke="#1e2130" stroke-width="1"/>

  <!-- Score circle area -->
  <circle cx="70" cy="70" r="42" fill="none" stroke="#1a1d2a" stroke-width="5"/>
  <circle cx="70" cy="70" r="42" fill="none" stroke="#22c55e" stroke-width="5"
          stroke-dasharray="264" stroke-dashoffset="0" stroke-linecap="round"
          transform="rotate(-90 70 70)"/>
  <text x="70" y="65" font-size="22" fill="#f1f5f9" font-family="SF Mono, Menlo, monospace" font-weight="700" text-anchor="middle">10</text>
  <text x="70" y="82" font-size="10" fill="#64748b" font-family="SF Mono, Menlo, monospace" text-anchor="middle">/10</text>

  <!-- Title -->
  <text x="130" y="50" font-size="11" fill="#475569" font-family="Inter, system-ui, sans-serif" font-weight="500" letter-spacing="2">DEPSEC</text>
  <text x="130" y="72" font-size="16" fill="#e2e8f0" font-family="Inter, system-ui, sans-serif" font-weight="600">depsec</text>
  <text x="130" y="90" font-size="11" fill="#64748b" font-family="Inter, system-ui, sans-serif">v0.2.0 · Supply Chain Security</text>

  <!-- Grade pill -->
  <rect x="460" y="45" width="52" height="30" rx="15" fill="#22c55e" fill-opacity="0.15"/>
  <text x="486" y="65" font-size="16" fill="#22c55e" font-family="SF Mono, Menlo, monospace" font-weight="700" text-anchor="middle">A</text>

  <!-- Divider -->
  <line x1="28" y1="118" x2="512" y2="118" stroke="#1e2130" stroke-width="1"/>

  <!-- Column headers -->
  <text x="28" y="145" font-size="10" fill="#475569" font-family="Inter, system-ui, sans-serif" font-weight="500" letter-spacing="1">CHECK</text>
  <text x="240" y="145" font-size="10" fill="#475569" font-family="Inter, system-ui, sans-serif" font-weight="500" letter-spacing="1">SCORE</text>
  <text x="480" y="145" font-size="10" fill="#475569" font-family="Inter, system-ui, sans-serif" font-weight="500" letter-spacing="1" text-anchor="end">STATUS</text>

  <!-- Row 1: Workflows -->
  <text x="28" y="176" font-size="13" fill="#cbd5e1" font-family="Inter, system-ui, sans-serif" font-weight="500">Workflows</text>
  <text x="28" y="190" font-size="10" fill="#475569" font-family="Inter, system-ui, sans-serif">SHA pinning, permissions, injection</text>
  <rect x="240" y="170" width="180" height="6" rx="3" fill="#1a1d2a"/>
  <rect x="240" y="170" width="180" height="6" rx="3" fill="#22c55e"/>
  <text x="430" y="178" font-size="11" fill="#94a3b8" font-family="SF Mono, Menlo, monospace">100%</text>
  <text x="490" y="178" font-size="11" fill="#22c55e" font-family="Inter, system-ui, sans-serif" font-weight="500">Pass</text>

  <!-- Row 2: Dependencies -->
  <text x="28" y="218" font-size="13" fill="#cbd5e1" font-family="Inter, system-ui, sans-serif" font-weight="500">Dependencies</text>
  <text x="28" y="232" font-size="10" fill="#475569" font-family="Inter, system-ui, sans-serif">129 packages via OSV</text>
  <rect x="240" y="212" width="180" height="6" rx="3" fill="#1a1d2a"/>
  <rect x="240" y="212" width="180" height="6" rx="3" fill="#22c55e"/>
  <text x="430" y="220" font-size="11" fill="#94a3b8" font-family="SF Mono, Menlo, monospace">100%</text>
  <text x="490" y="220" font-size="11" fill="#22c55e" font-family="Inter, system-ui, sans-serif" font-weight="500">Pass</text>

  <!-- Row 3: Secrets -->
  <text x="28" y="260" font-size="13" fill="#cbd5e1" font-family="Inter, system-ui, sans-serif" font-weight="500">Secrets</text>
  <text x="28" y="274" font-size="10" fill="#475569" font-family="Inter, system-ui, sans-serif">20 patterns, 47 files scanned</text>
  <rect x="240" y="254" width="180" height="6" rx="3" fill="#1a1d2a"/>
  <rect x="240" y="254" width="180" height="6" rx="3" fill="#22c55e"/>
  <text x="430" y="262" font-size="11" fill="#94a3b8" font-family="SF Mono, Menlo, monospace">100%</text>
  <text x="490" y="262" font-size="11" fill="#22c55e" font-family="Inter, system-ui, sans-serif" font-weight="500">Pass</text>

  <!-- Footer -->
  <line x1="28" y1="292" x2="512" y2="292" stroke="#1e2130" stroke-width="1"/>
  <text x="28" y="310" font-size="10" fill="#334155" font-family="Inter, system-ui, sans-serif">github.com/chocksy/depsec</text>
  <text x="512" y="310" font-size="10" fill="#334155" font-family="Inter, system-ui, sans-serif" text-anchor="end">Own your security</text>
</svg>
