                vec![\"No GitHub Actions workflows found (N/A)\".into()],\n            ));\n        }\n\n        let mut findings = Vec::new();\n        let mut pass_messages = Vec::new();\n        let mut workflow_count = 0;\n\n        let entries = std::fs::read_dir(\u0026workflows_dir)?;\n        for entry in entries {\n            let entry = entry?;\n            let path = entry.path();\n            let ext = path.extension().and_then(|e| e.to_str());\n            if !matches!(ext, Some(\"yml\" | \"yaml\")) {\n                continue;\n            }\n\n            workflow_count += 1;\n            let content = std::fs::read_to_string(\u0026path)?;\n            let rel_path = path\n                .strip_prefix(ctx.root)\n                .unwrap_or(\u0026path)\n                .to_string_lossy()\n                .to_string();\n\n            check_action_pinning(\u0026content, \u0026rel_path, \u0026mut findings);\n            check_permissions(\u0026content, \u0026rel_path, \u0026mut findings);\n            check_pull_request_target(\u0026content, \u0026rel_path, \u0026mut findings);\n            check_expression_injection(\u0026content, \u0026rel_path, \u0026mut findings);\n            check_dangerous_git_flags(\u0026content, \u0026rel_path, \u0026mut findings);\n        }\n\n        if workflow_count == 0 {\n            return Ok(CheckResult::new(\n                \"workflows\",\n                vec![],\n                max_score,\n                vec![\"No workflow files found in .github/workflows/\".into()],\n            ));\n        }\n\n        // Build pass messages for checks that found no issues\n        let has_pinning_issue = findings.iter().any(|f| f.rule_id == \"DEPSEC-W001\");\n        let has_permissions_issue = findings.iter().any(|f| f.rule_id == \"DEPSEC-W002\");\n        let has_prt_issue = findings.iter().any(|f| f.rule_id == \"DEPSEC-W003\");\n        let has_injection_issue = findings.iter().any(|f| f.rule_id == \"DEPSEC-W004\");\n        let has_git_flag_issue = findings.iter().any(|f| f.rule_id == \"DEPSEC-W005\");\n\n        if !has_pinning_issue {\n            pass_messages.push(\"All GitHub Actions pinned to SHA\".into());\n        }\n        if !has_permissions_issue {\n            pass_messages.push(\"Workflow permissions minimized\".into());\n        }\n        if !has_prt_issue \u0026\u0026 !has_injection_issue {\n            pass_messages.push(\"No injection patterns detected\".into());\n        }\n        if !has_git_flag_issue {\n            pass_messages.push(\"No dangerous git flags found\".into());\n        }\n\n        Ok(CheckResult::new(\n            \"workflows\",\n            findings,\n            max_score,\n            pass_messages,\n        ))\n    }\n}\n\n/// DEPSEC-W001: Actions not pinned to commit SHA\nfn check_action_pinning(content: \u0026str, file: \u0026str, findings: \u0026mut Vec\u003cFinding\u003e) {\n    // Match `uses: owner/repo@ref` but not already a 40-char hex SHA\n    let re = Regex::new(r\"(?m)^\\s*-?\\s*uses:\\s*([^\\s#]+)\").unwrap();\n    let sha_re = Regex::new(r\"@[0-9a-f]{40}$\").unwrap();\n\n    for (line_num, line) in content.lines().enumerate() {\n        if let Some(caps) = re.captures(line) {\n            let action_ref = caps.get(1).unwrap().as_str();\n\n            // Skip local actions (./), Docker actions (docker://), and bare actions without @\n            if action_ref.starts_with(\"./\")\n                || action_ref.starts_with(\"docker://\")\n                || !action_ref.contains('@')\n            {\n                continue;\n            }\n\n            // Check if already pinned to a SHA\n            if sha_re.is_match(action_ref) {\n                continue;\n            }\n\n            findings.push(Finding {\n                rule_id: \"DEPSEC-W001\".into(),\n                severity: Severity::High,\n                message: format!(\"Action not pinned to commit SHA: {action_ref}\"),\n                file: Some(file.into()),\n                line: Some(line_num + 1),\n                suggestion: Some(\"Pin to a full commit SHA instead of a tag\".into()),\n                confidence: None,\n                package: None,\n                reachable: None,\n                auto_fixable: true,\n            });\n        }\n    }\n}\n\n/// DEPSEC-W002: permissions block missing or write-all\nfn check_permissions(content: \u0026str, file: \u0026str, findings: \u0026mut Vec\u003cFinding\u003e) {\n    // Look for a top-level `permissions:` line (not indented = top-level in YAML)\n    let mut has_permissions = false;\n    let mut is_write_all = false;\n\n    for line in content.lines() {\n        // Top-level key: starts at column 0, not a comment\n        if line.starts_with(\"permissions:\") {\n            has_permissions = true;\n            let value = line.trim_start_matches(\"permissions:\").trim();\n            if value == \"write-all\" {\n                is_write_all = true;\n            }\n            break;\n        }\n    }\n\n    if !has_permissions {\n        findings.push(Finding {\n            rule_id: \"DEPSEC-W002\".into(),\n            severity: Severity::Medium,\n            message: \"No top-level permissions block — defaults to write-all\".into(),\n            file: Some(file.into()),\n            line: None,\n            suggestion: Some(\n                \"Add 'permissions: {}' for read-only, or specify minimal permissions\".into(),\n            ),\n            confidence: None,\n            package: None,\n            reachable: None,\n            auto_fixable: false,\n        });\n    } else if is_write_all {\n        findings.push(Finding {\n            rule_id: \"DEPSEC-W002\".into(),\n            severity: Severity::Medium,\n            message: \"Workflow permissions set to write-all\".into(),\n            file: Some(file.into()),\n            line: None,\n            suggestion: Some(\"Set minimal permissions per job instead of write-all\".into()),\n            confidence: None,\n            package: None,\n            reachable: None,\n            auto_fixable: false,\n        });\n    }\n}\n\n/// DEPSEC-W003: pull_request_target with checkout\nfn check_pull_request_target(content: \u0026str, file: \u0026str, findings: \u0026mut Vec\u003cFinding\u003e) {\n    let has_prt = content.contains(\"pull_request_target\");\n    if !has_prt {\n        return;\n    }\n\n    let checkout_re = Regex::new(r\"(?i)uses:\\s*actions/checkout\").unwrap();\n    for (line_num, line) in content.lines().enumerate() {\n        // Skip commented lines\n        if line.trim().starts_with('#') {\n            continue;\n        }\n        if checkout_re.is_match(line) {\n            findings.push(Finding {\n                rule_id: \"DEPSEC-W003\".into(),\n                severity: Severity::Critical,\n                message: \"pull_request_target with actions/checkout detected (code injection risk)\"\n                    .into(),\n                file: Some(file.into()),\n                line: Some(line_num + 1),\n                suggestion: Some(\n                    \"Use pull_request instead, or avoid checking out PR code in pull_request_target\"\n                        .into(),\n                ),\n                confidence: None, package: None, reachable: None,\n                auto_fixable: false,\n            });\n        }\n    }\n}\n\n/// DEPSEC-W004: User-controlled expressions in run: blocks\nfn check_expression_injection(content: \u0026str, file: \u0026str, findings: \u0026mut Vec\u003cFinding\u003e) {\n    let mut in_run_block = false;\n    let mut run_indent: usize = 0;\n\n    for (line_num, line) in content.lines().enumerate() {\n        let trimmed = line.trim();\n\n        // Detect `run:` lines (may appear as `run:` or `- run:`)\n        let is_run_line = trimmed.starts_with(\"run:\") || trimmed.starts_with(\"- run:\");\n        if is_run_line {\n            // Detect block scalar indicators: |, |-, |+, \u003e, \u003e-, \u003e+\n            let after_run = trimmed\n                .split_once(\"run:\")\n                .map(|(_, r)| r.trim())\n                .unwrap_or(\"\");\n            in_run_block = after_run.starts_with('|') || after_run.starts_with('\u003e');\n            run_indent = line.len() - line.trim_start().len();\n            check_line_for_injection(line, line_num, file, findings);\n            continue;\n        }\n\n        // Continue checking multiline run blocks\n        if in_run_block {\n            if trimmed.is_empty() {\n                continue; // Blank lines within a block are OK\n            }\n            // End of block when indentation returns to or below the run: level\n            let current_indent = line.len() - line.trim_start().len();\n            if current_indent \u003c= run_indent {\n                in_run_block = false;\n                continue;\n            }\n            check_line_for_injection(line, line_num, file, findings);\n        }\n    }\n}\n\nfn check_line_for_injection(line: \u0026str, line_num: usize, file: \u0026str, findings: \u0026mut Vec\u003cFinding\u003e) {\n    for expr in INJECTION_EXPRESSIONS {\n        // Match both \"${{ expr }}\" (with space) and \"${{expr}}\" (without space)\n        let pattern_spaced = format!(\"${{{{ {expr}\");\n        let pattern_compact = format!(\"${{{{{expr}\");\n        if line.contains(\u0026pattern_spaced) || line.contains(\u0026pattern_compact) {\n            findings.push(Finding {\n                rule_id: \"DEPSEC-W004\".into(),\n                severity: Severity::Critical,\n                message: format!(\"User-controlled expression in run block: ${{{{ {expr} }}}}\"),\n                file: Some(file.into()),\n                line: Some(line_num + 1),\n                suggestion: Some(\n                    \"Pass the value through an environment variable instead of inline expansion\"\n                        .into(),\n                ),\n                confidence: None,\n                package: None,\n                reachable: None,\n                auto_fixable: false,\n            });\n        }\n    }\n}\n\n/// DEPSEC-W005: --no-verify or --force in git commands\nfn check_dangerous_git_flags(content: \u0026str, file: \u0026str, findings: \u0026mut Vec\u003cFinding\u003e) {\n    let git_noverify = Regex::new(r\"git\\s+.*--no-verify\").unwrap();\n    let git_force = Regex::new(r\"git\\s+push\\s+.*--force(?:\\s|$)\").unwrap();\n\n    for (line_num, line) in content.lines().enumerate() {\n        if git_noverify.is_match(line) {\n            findings.push(Finding {\n                rule_id: \"DEPSEC-W005\".into(),\n                severity: Severity::Medium,\n                message: \"git --no-verify flag skips pre-commit hooks\".into(),\n                file: Some(file.into()),\n                line: Some(line_num + 1),\n                suggestion: Some(\"Remove --no-verify to ensure hooks run\".into()),\n                confidence: None,\n                package: None,\n                reachable: None,\n                auto_fixable: false,\n            });\n        }\n\n        if git_force.is_match(line) {\n            findings.push(Finding {\n                rule_id: \"DEPSEC-W005\".into(),\n                severity: Severity::Medium,\n                message: \"git push --force can overwrite remote history\".into(),\n                file: Some(file.into()),\n                line: Some(line_num + 1),\n                suggestion: Some(\"Use --force-with-lease instead of --force\".into()),\n                confidence: None,\n                package: None,\n                reachable: None,\n                auto_fixable: false,\n            });\n        }\n    }\n}\n\n#[cfg(test)]\nmod tests {\n    use super::*;\n    use crate::config::Config;\n    use std::fs;\n    use tempfile::TempDir;\n\n    fn setup_workflow(content: \u0026str) -\u003e (TempDir, std::path::PathBuf) {\n        let dir = TempDir::new().unwrap();\n        let wf_dir = dir.path().join(\".github\").join(\"workflows\");\n        fs::create_dir_all(\u0026wf_dir).unwrap();\n        let wf_file = wf_dir.join(\"ci.yml\");\n        fs::write(\u0026wf_file, content).unwrap();\n        (dir, wf_file)\n    }\n\n    #[test]\n    fn test_no_workflows_dir() {\n        let dir = TempDir::new().unwrap();\n        let config = Config::default();\n        let ctx = ScanContext {\n            root: dir.path(),\n            config: \u0026config,\n        };\n        let result = WorkflowsCheck.run(\u0026ctx).unwrap();\n        assert_eq!(result.score, 25.0);\n        assert!(result.findings.is_empty());\n    }\n\n    #[test]\n    fn test_pinned_action_passes() {\n        let (dir, _) = setup_workflow(\n            r#\"\nname: CI\non: push\npermissions: {}\njobs:\n  build:\n    runs-on: ubuntu-latest\n    steps:\n      - uses: actions/checkout@a5ac7e51b41094c92402da3b24376905380afc29\n\"#,\n        );\n        let config = Config::default();\n        let ctx = ScanContext {\n            root: dir.path(),\n            config: \u0026config,\n        };\n        let result = WorkflowsCheck.run(\u0026ctx).unwrap();\n        let pinning_findings: Vec\u003c_\u003e = result\n            .findings\n            .iter()\n            .filter(|f| f.rule_id == \"DEPSEC-W001\")\n            .collect();\n        assert!(pinning_findings.is_empty());\n    }\n\n    #[test]\n    fn test_unpinned_action_detected() {\n        let (dir, _) = setup_workflow(\n            r#\"\nname: CI\non: push\npermissions: {}\njobs:\n  build:\n    runs-on: ubuntu-latest\n    steps:\n      - uses: actions/checkout@v4\n\"#,\n        );\n        let config = Config::default();\n        let ctx = ScanContext {\n            root: dir.path(),\n            config: \u0026config,\n        };\n        let result = WorkflowsCheck.run(\u0026ctx).unwrap();\n        let pinning_findings: Vec\u003c_\u003e = result\n            .findings\n            .iter()\n            .filter(|f| f.rule_id == \"DEPSEC-W001\")\n            .collect();\n        assert_eq!(pinning_findings.len(), 1);\n        assert!(pinning_findings[0].auto_fixable);\n    }\n\n    #[test]\n    fn test_missing_permissions_detected() {\n        let (dir, _) = setup_workflow(\n            r#\"\nname: CI\non: push\njobs:\n  build:\n    runs-on: ubuntu-latest\n    steps:\n      - uses: actions/checkout@a5ac7e51b41094c92402da3b24376905380afc29\n\"#,\n        );\n        let config = Config::default();\n        let ctx = ScanContext {\n            root: dir.path(),\n            config: \u0026config,\n        };\n        let result = WorkflowsCheck.run(\u0026ctx).unwrap();\n        let perm_findings: Vec\u003c_\u003e = result\n            .findings\n            .iter()\n            .filter(|f| f.rule_id == \"DEPSEC-W002\")\n            .collect();\n        assert_eq!(perm_findings.len(), 1);\n    }\n\n    #[test]\n    fn test_write_all_permissions_detected() {\n        let (dir, _) = setup_workflow(\n            r#\"\nname: CI\non: push\npermissions: write-all\njobs:\n  build:\n    runs-on: ubuntu-latest\n    steps:\n      - uses: actions/checkout@a5ac7e51b41094c92402da3b24376905380afc29\n\"#,\n        );\n        let config = Config::default();\n        let ctx = ScanContext {\n            root: dir.path(),\n            config: \u0026config,\n        };\n        let result = WorkflowsCheck.run(\u0026ctx).unwrap();\n        let perm_findings: Vec\u003c_\u003e = result\n            .findings\n            .iter()\n            .filter(|f| f.rule_id == \"DEPSEC-W002\")\n            .collect();\n        assert_eq!(perm_findings.len(), 1);\n    }\n\n    #[test]\n    fn test_pull_request_target_with_checkout() {\n        let (dir, _) = setup_workflow(\n            r#\"\nname: CI\non: pull_request_target\npermissions: {}\njobs:\n  build:\n    runs-on: ubuntu-latest\n    steps:\n      - uses: actions/checkout@a5ac7e51b41094c92402da3b24376905380afc29\n\"#,\n        );\n        let config = Config::default();\n        let        }\n\n        let content = std::fs::read_to_string(\u0026path)?;\n        let rel_path = path\n            .strip_prefix(root)\n            .unwrap_or(\u0026path)\n            .to_string_lossy()\n            .to_string();\n\n        let (new_content, file_results) = fix_file_pinning(\u0026content, \u0026rel_path)?;\n\n        if !file_results.is_empty() \u0026\u0026 !dry_run {\n            std::fs::write(\u0026path, \u0026new_content)?;\n        }\n\n        results.extend(file_results);\n    }\n\n    Ok(results)\n}\n\nfn fix_file_pinning(content: \u0026str, file: \u0026str) -\u003e anyhow::Result\u003c(String, Vec\u003cFixResult\u003e)\u003e {\n    let uses_re = Regex::new(r\"(?m)(^\\s*-?\\s*uses:\\s*)([^\\s#]+)(.*)$\").unwrap();\n    let sha_re = Regex::new(r\"@[0-9a-f]{40}$\").unwrap();\n\n    let mut new_content = String::new();\n    let mut results = Vec::new();\n\n    for line in content.lines() {\n        if let Some(caps) = uses_re.captures(line) {\n            let prefix = caps.get(1).unwrap().as_str();\n            let action_ref = caps.get(2).unwrap().as_str();\n            let suffix = caps.get(3).unwrap().as_str();\n\n            // Skip local, Docker, or already-pinned actions\n            if action_ref.starts_with(\"./\")\n                || action_ref.starts_with(\"docker://\")\n                || !action_ref.contains('@')\n                || sha_re.is_match(action_ref)\n            {\n                new_content.push_str(line);\n                new_content.push('\\n');\n                continue;\n            }\n\n            // Parse owner/repo@tag\n            let (action_name, tag) = match action_ref.rsplit_once('@') {\n                Some((name, tag)) =\u003e (name, tag),\n                None =\u003e {\n                    new_content.push_str(line);\n                    new_content.push('\\n');\n                    continue;\n                }\n            };\n\n            // Resolve tag to SHA via GitHub API\n            match resolve_tag_to_sha(action_name, tag) {\n                Ok(sha) =\u003e {\n                    // Strip any existing inline comment to avoid duplication\n                    let clean_suffix = suffix\n                        .find('#')\n                        .map(|_| \"\") // Drop old comment entirely\n                        .unwrap_or(suffix);\n                    let new_line = format!(\"{prefix}{action_name}@{sha}{clean_suffix} # {tag}\");\n                    new_content.push_str(\u0026new_line);\n                    new_content.push('\\n');\n\n                    results.push(FixResult {\n                        file: file.into(),\n                        action: action_name.into(),\n                        old_ref: tag.into(),\n                        new_sha: sha,\n                        applied: true,\n                    });\n                }\n                Err(e) =\u003e {\n                    eprintln!(\"Warning: could not resolve {action_name}@{tag}: {e}\");\n                    new_content.push_str(line);\n                    new_content.push('\\n');\n\n                    results.push(FixResult {\n                        file: file.into(),\n                        action: action_name.into(),\n                        old_ref: tag.into(),\n                        new_sha: String::new(),\n                        applied: false,\n                    });\n                }\n            }\n        } else {\n            new_content.push_str(line);\n            new_content.push('\\n');\n        }\n    }\n\n    Ok((new_content, results))\n}\n\nfn resolve_tag_to_sha(action: \u0026str, tag: \u0026str) -\u003e anyhow::Result\u003cString\u003e {\n    let (owner, repo) = action\n        .split_once('/')\n        .context(\"Invalid action format — expected owner/repo\")?;\n\n    // Strip any sub-path (e.g., \"actions/cache/restore\" -\u003e \"actions/cache\")\n    let repo = repo.split('/').next().unwrap_or(repo);\n\n    let token = std::env::var(\"GITHUB_TOKEN\").ok();\n    let agent = ureq::AgentBuilder::new()\n        .timeout_read(std::time::Duration::from_secs(30))\n        .user_agent(\"depsec\")\n        .build();\n\n    // Try as a tag first, then as a branch\n    for ref_type in [\"tags\", \"heads\"] {\n        let url = format!(\"https://api.github.com/repos/{owner}/{repo}/git/ref/{ref_type}/{tag}\");\n\n        let mut req = agent\n            .get(\u0026url)\n            .set(\"Accept\", \"application/vnd.github.v3+json\");\n\n        if let Some(ref t) = token {\n            req = req.set(\"Authorization\", \u0026format!(\"Bearer {t}\"));\n        }\n\n        let resp = match req.call() {\n            Ok(r) =\u003e r,\n            Err(ureq::Error::Status(_, _)) =\u003e continue, // 404 etc — try next ref_type\n            Err(e) =\u003e anyhow::bail!(\"GitHub API request failed: {e}\"),\n        };\n\n        let body: serde_json::Value = resp.into_json()?;\n\n        // Handle annotated tags (type: \"tag\") — need to dereference\n        if let Some(obj) = body.get(\"object\") {\n            let obj_type = obj[\"type\"].as_str().unwrap_or(\"\");\n            let sha = obj[\"sha\"].as_str().unwrap_or(\"\");\n\n            if obj_type == \"tag\" {\n                // Dereference annotated tag to get the commit SHA\n                let tag_url = obj[\"url\"].as_str().unwrap_or(\"\");\n                if !tag_url.is_empty() \u0026\u0026 tag_url.starts_with(\"https://api.github.com/\") {\n                    let mut tag_req = agent\n                        .get(tag_url)\n                        .set(\"Accept\", \"application/vnd.github.v3+json\");\n                    if let Some(ref t) = token {\n                        tag_req = tag_req.set(\"Authorization\", \u0026format!(\"Bearer {t}\"));\n                    }\n                    if let Ok(tag_resp) = tag_req.call() {\n                        let tag_body: serde_json::Value = tag_resp.into_json()?;\n                        if let Some(commit_sha) = tag_body[\"ob  ubuntu-latest\n    steps:\n      - uses: ./local-action\n\"#;\n        let (_, results) = fix_file_pinning(content, \"ci.yml\").unwrap();\n        assert!(results.is_empty());\n    }\n\n    #[test]\n    fn test_fix_file_skips_docker_action() {\n        let content = r#\"\nname: CI\non: push\njobs:\n  build:\n    runs-on: ubuntu-latest\n    steps:\n      - uses: docker://alpine:3.18\n\"#;\n        let (_, results) = fix_file_pinning(content, \"ci.yml\").unwrap();\n        assert!(results.is_empty());\n    }\n\n    #[test]\n    fn test_print_fix_results_empty() {\n        print_fix_results(\u0026[], false);\n        // Should not panic\n    }\n}\n","traces":[{"line":15,"address":[],"length":0,"stats":{"Line":0}},{"line":16,"address":[],"length":0,"stats":{"Line":0}},{"line":17,"address":[],"length":0,"stats":{"Line":0}},{"line":18,"address":[],"length":0,"stats":{"Line":0}},{"line":21,"address":[],"length":0,"stats":{"Line":0}},{"line":22,"address":[],"length":0,"stats":{"Line":0}},{"line":24,"address":[],"length":0,"stats":{"Line":0}},{"line":25,"address":[],"length":0,"stats":{"Line":0}},{"line":26,"address":[],"length":0,"stats":{"Line":0}},{"line":27,"address":[],"length":0,"stats":{"Line":0}},{"line":28,"address":[],"length":0,"stats":{"Line":0}},{"line":29,"address":[],"length":0,"stats":{"Line":0}},{"line":32,"address":[],"length":0,"stats":{"Line":0}},{"line":33,"address":[],"length":0,"stats":{"Line":0}},{"line":34,"address":[],"length":0,"stats":{"Line":0}},{"line":35,"address":[],"length":0,"stats":{"Line":0}},{"line":39,"address":[],"length":0,"stats":{"Line":0}},{"line":41,"address":[],"length":0,"stats":{"Line":0}},{"line":42,"address":[],"length":0,"stats":{"Line":0}},{"line":45,"address":[],"length":0,"stats":{"Line":0}},{"line":48,"address":[],"length":0,"stats":{"Line":0}},{"line":51,"address":[],"length":0,"stats":{"Line":3}},{"line":52,"address":[],"length":0,"stats":{"Line":12}},{"line":53,"address":[],"length":0,"stats":{"Line":12}},{"line":55," chdog) → report\npub fn run_install_guard(\n    args: \u0026[String],\n    root: \u0026Path,\n    config: \u0026InstallConfig,\n    json_output: bool,\n) -\u003e Result\u003cInstallGuardResult\u003e {\n    if args.is_empty() {\n        anyhow::bail!(\"No command specified. Usage: depsec install-guard \u003ccommand\u003e [args...]\");\n    }\n\n    let command_str = args.join(\" \");\n\n    // Detect if this is an install command (not just any command)\n    let is_install = is_install_command(args);\n\n    // Phase 1: Preflight check (for install commands with new packages)\n    if config.preflight \u0026\u0026 is_install {\n        let new_packages = extract_new_packages(args);\n        if !new_packages.is_empty() {\n            eprintln!(\n                \"\\n\\x1b[1m[depsec install-guard]\\x1b[0m Running preflight check on {} new package{}...\",\n                new_packages.len(),\n                if new_packages.len() == 1 { \"\" } else { \"s\" }\n            );\n\n            match crate::preflight::run_preflight(root, false) {\n                Ok(result) =\u003e {\n                    let high_risk = result.findings.iter().any(|f| {\n                        matches!(\n                            f.severity,\n                            crate::checks::Severity::Critical | crate::checks::Severity::High\n                        )\n                    });\n\n                    if high_risk {\n                        eprintln!(\"  \\x1b[31m⚠ Preflight found high-risk issues!\\x1b[0m\");\n                        for f in \u0026result.findings {\n                            if matches!(\n                                f.severity,\n                                crate::checks::Severity::Critical | crate::checks::Severity::High\n                            ) {\n                                eprintln!(\"    \\x1b[31m✗\\x1b[0m {}\", f.message);\n                            }\n                        }\n                        eprintln!();\n                    } els completion_tokens: Option\u003cu32\u003e,\n    total_tokens: Option\u003cu32\u003e,\n}\n\npub struct ChatResponse {\n    pub content: String,\n    #[allow(dead_code)]\n    pub model: String,\n    pub usage: TokenUsage,\n}\n\n#[derive(Debug, Clone, Default)]\npub struct TokenUsage {\n    pub prompt_tokens: u32,\n    pub completion_tokens: u32,\n    pub total_tokens: u32,\n}\n\npub struct LlmClient {\n    api_key: String,\n    model: String,\n    base_url: String,\n    timeout_secs: u64,\n}\n\nimpl LlmClient {\n    /// Create client from OPENROUTER_API_KEY environment variable\n    #[allow(dead_code)]\n    pub fn from_env() -\u003e Option\u003cSelf\u003e {\n        let api_key = std::env::var(\"OPENROUTER_API_KEY\").ok()?;\n        if api_key.is_empty() {\n            return None;\n        }\n        Some(Self {\n            api_key,\n            model: DEFAULT_MODEL.into(),\n            base_url: DEFAULT_BASE_URL.into(),\n            timeout_secs: DEFAULT_TIMEOUT_SECS,\n        })\n    }\n\n    /// Create client from config, falling back to env\n    pub fn from_config(config: \u0026crate::config::TriageConfig) -\u003e Option\u003cSelf\u003e {\n        // Try config's env var name first, then default OPENROUTER_API_KEY\n        let api_key = std::env::var(\u0026config.api_key_env)\n            .or_else(|_| std::env::var(\"OPENROUTER_API_KEY\"))\n            .ok()?;\n        if api_key.is_empty() {\n            return None;\n        }\n        Some(Self {\n            api_key,\n            model: config.model.clone(),\n            base_url: DEFAULT_BASE_URL.into(),\n            timeout_secs: config.timeout_seconds,\n        })\n    }\n\n    pub fn model(\u0026self) -\u003e \u0026str {\n        \u0026self.model\n    }\n\n    /// Send a chat completion request and return the response\n    pub fn chat(\u0026self, messages: \u0026[ChatMessage]) -\u003e Result\u003cChatResponse\u003e {\n        let request = ChatRequest {\n            model: self.model.clone(),\n            messages: messages.to_vec(),\n            temperature: 0.1, // Low creativity for classification tasks\n        };\n\n        let response = ureq::post(\u0026format!(\"{}/chat/completions\", self.base_url))\n            .set(\"Authorization\", \u0026format!(\"Bearer {}\", self.api_key))\n            .set(\"Content-Type\", \"application/json\")\n            .set(\"HTTP-Referer\", \"https://github.com/chocksy/depsec\")\n            .set(\"X-Title\", \"depsec\")\n            .timeout(std::time::Duration::from_secs(self.timeout_secs))\n            .send_json(\u0026request)\n            .context(\"Failed to send request to OpenRouter\")?;\n\n        let raw: ChatResponseRaw = response\n            .into_json()\n            .context(\"Failed to parse OpenRouter response\")?;\n\n        let content = raw\n            .choices\n            .first()\n            .and_then(|c| c.message.content.clone())\n            .unwrap_or_default();\n\n        let usage = raw.usage.map_or(TokenUsage::default(), |u| TokenUsage {\n            prompt_tokens: u.prompt_tokens.unwrap_or(0),\n            completion_tokens: u.completion_tokens.unwrap_or(0),\n            total_tokens: u.total_tokens.unwrap_or(0),\n        });\n\n        Ok(ChatResponse {\n            content,\n            model: raw.model.unwrap_or_else(|| self.model.clone()),\n            usage,\n        })\n    }\n\n    /// Send a chat request and parse the response as JSON\n    pub fn chat_json\u003cT: serde::de::DeserializeOwned\u003e(\n        \u0026self,\n        messages: \u0026[ChatMessage],\n    ) -\u003e Result\u003c(T, TokenUsage)\u003e {\n        let response = self.chat(messages)?;\n\n        // Try to extract JSON from the response — handle markdown code blocks\n        let json_str = extract_json(\u0026response.content).unwrap_or_else(|| response.content.clone());\n\n        let parsed: T = serde_json::from_str(\u0026json_str).with_context(|| {\n            format!(\n                \"Failed to parse LLM response as JSON: {}\",\n                \u0026json_str[..json_str.len().min(200)]\n            )\n        })?;\n\n        Ok((parsed, response.usage))\n    }\n\n    /// Rough cost estimate in USD based on model pricing\n    pub fn estimate_cost(\u0026self, input_tokens: u32, output_tokens: u32) -\u003e f64 {\n        // Approximate pricing per 1M tokens (as of 2026)\n        let (input_per_m, output_per_m) = match self.model.as_str() {\n            m if m.contains(\"claude-sonnet\") =\u003e (3.0, 15.0),\n            m if m.contains(\"claude-haiku\") =\u003e (0.80, 4.0),\n            m if m.contains(\"claude-opus\") =\u003e (15.0, 75.0),\n            m if m.contains(\"gpt-4o\") =\u003e (2.50, 10.0),\n            _ =\u003e (3.0, 15.0), // Default to Sonnet-ish pricing\n        };\n\n        (input_tokens as f64 / 1_000_000.0) * input_per_m\n            + (output_tokens as f64 / 1_000_000.0) * output_per_m\n    }\n}\n\n/// Extract JSON from a response that might be wrapped in markdown code blocks\nfn extract_json(content: \u0026str) -\u003e Option\u003cString\u003e {\n    let trimmed = content.trim();\n\n    // Already looks like JSON\n    if trimmed.starts_with('{') || trimmed.starts_with('[') {\n        return Some(trimmed.to_string());\n    }\n\n    // Extract from ```json ... ``` blocks\n    if let Some(start) = trimmed.find(\"```json\") {\n        let after_marker = \u0026trimmed[start + 7..];\n        if let Some(end) = after_marker.find(\"```\") {\n            return Some(after_marker[..end].trim().to_string());\n        }\n    }\n\n    // Extract from ``` ... ``` blocks\n    if let Some(start) = trimmed.find(\"```\") {\n        let after_marker = \u0026trimmed[start + 3..];\n        // Skip to next line\n        if let Some(newline) = after_marker.find('\\n') {\n            let content_start = \u0026after_marker[newline + 1..];\n            if let Some(end) = content_start.find(\"```\") {\n                return Some(content_start[..end].trim().to_string());\n            }\n        }\n    }\n\n    // Last resort: find first { and last } — handles preamble text before JSON\n    if let (Some(start), Some(end)) = (trimmed.find('{'), trimmed.rfind('}')) {\n        if end \u003e start {\n            return Some(trimmed[start..=end].to_string());\n        }\n    }\n\n    None\n}\n\n/// Print setup instructions when API key is missing\npub fn print_setup_instructions() {\n    eprintln!(\"LLM triage requires an OpenRouter API key.\");\n    eprintln!();\n    eprintln!(\"Setup:\");\n    eprintln!(\"  1. Get an API key at https://openrouter.ai/keys\");\n    eprintln!(\"  2. Set the environment variable:\");\n    eprintln!(\"     export OPENROUTER_API_KEY=sk-or-...\");\n    eprintln!();\n    eprintln!(\"Or configure in depsec.toml:\");\n    eprintln!(\"  [triage]\");\n    eprintln!(\"  api_key_env = \\\"OPENROUTER_API_KEY\\\"\");\n    eprintln!(\"  model = \\\"anthropic/claude-sonnet-4-6\\\"\");\n}\n\n#[cfg(test)]\nmod tests {\n    use super::*;\n\n    #[test]\n    fn test_extract_json_raw() {\n        let input = r#\"{\"classification\": \"TP\", \"confidence\": 0.9}\"#;\n        assert_eq!(extract_json(input), Some(input.to_string()));\n    }\n\n    #[test]\n    fn test_extract_json_code_block() {\n        let input = \"Here's the analysis:\\n```json\\n{\\\"classification\\\": \\\"FP\\\"}\\n```\\n\";\n        assert_eq!(\n            extract_json(input),\n            Some(\"{\\\"classification\\\": \\\"FP\\\"}\".to_string())\n        );\n    }\n\n    #[test]\n    fn test_extract_json_bare_block() {\n        let input = \"```\\n{\\\"classification\\\": \\\"NI\\\"}\\n```\";\n        assert_eq!(\n            extract_json(input),\n            Some(\"{\\\"classification\\\": \\\"NI\\\"}\".to_string())\n        );\n    }\n\n    #[test]\n    fn test_extract_json_no_json() {\n        let input = \"This is just text with no JSON\";\n        assert_eq!(extract_json(input), None);\n    }\n\n    #[test]\n    fn test_estimate_cost_sonnet() {\n        let client = LlmClient {\n            api_key: \"test\".into(),\n            model: \"anthropic/claude-sonnet-4-6\".into(),\n            base_url: DEFAULT_BASE_URL.into(),\n            timeout_secs: 60,\n        };\n        // 1000 input + 500 output tokens\n        let cost = client.estimate_cost(1000, 500);\n        assert!(cost \u003e 0.0);\n        assert!(cost \u003c 0.02); // Should be fractions of a cent for small requests\n    }\n\n    #[test]\n    fn test_from_env_missing() {\n        // When OPENROUTER_API_KEY is not set, should return None\n        std::env::remove_var(\"OPENROUTER_API_KEY\");\n        assert!(LlmClient::from_env().is_none());\n    }\n}\n","traces":[{"line":71,"address":[],"length":0,"stats":{"Line":1}},{"line":72,"address":[],"length":0,"stats":{"Line":3}},{"line":73,"address":[],"length":0,"stats":{"Line":0}},{"line":74,"address":[],"length":0,"stats":{"Line":0}},{"line":76,"address":[],"length":0,"stats":{"Line":0}},{"line":77,"address":[],"length":0,"stats":{"Line":0}},{"line":78,"address":[],"length":0,"stats":{"Line":0}},{"line":79,"address":[],"length":0,"stats":{"Line":0}},{"line":80,"address":[],"length":0,"stats":{"Line":0}},{"line":85,"address":[],"length":0,"stats":{"Line":0}},{"line":87,"address":[],"length":0,"stats":{"Line":0}},{"line":88,"address":[],"length":0,"stats":{"Line":0}},{"line":90,"address":[],"length":0,"stats":{"Line":0}},{"line":91,"address":[],"length":0,"stats":{"Line":0}},{"line":93,"address":[],"length":0,"stats":{"Line":0}},{"line":94,"address":[],"length":0,"stats":{"Line":0}},{"line":95,"address":[],"length":0,"stats":{"Line":0}},{"line":96,"address":[],"length":0,"stats":{"Line":0}},{"line":97,"address":[],"length":0,"stats":{"Line":0}},{"line":101,"address":[],"length":0,"stats":{"Line":0}},{"line":102,"address":[],"length":0,"stats":{"Line":0}},{"line":106,"address":[],"length":0,"stats":{"Line":0}},{"line":108,"address":[],"length":0,"stats":{"Line":0}},{"line":109,"address":[],"length":0,"stats":{"L nmod triage;\nmod triage_cache;\nmod watchdog;\n\nuse std::path::PathBuf;\nuse std::process::ExitCode;\n\nuse clap::{Parser, Subcommand, ValueEnum};\n\n#[derive(Debug, Clone, Copy, ValueEnum)]\npub enum Persona {\n    /// High-confidence findings only (default — minimal noise)\n    Regular,\n    /// Medium+ confidence findings\n    Pedantic,\n    /// All findings including low confidence\n    Auditor,\n}\n\n#[derive(Parser)]\n#[command(name = \"depsec\", version, about = \"Supply Chain Security Scanner\")]\nstruct Cli {\n    #[command(subcommand)]\n    command: Commands,\n\n    /// Disable colored output\n    #[arg(long, global = true)]\n    no_color: bool,\n}\n\n#[derive(Subcommand)]\nenum Commands {\n    /// Run security checks on a project\n    Scan {\n        /// Path to the project root\n        #[arg(default_value = \".\")]\n        path: PathBuf,\n\n        /// Comma-separated list of checks to run\n        #[arg(long, value_delimiter = ',')]\n        checks: Option\u003cVec\u003cString\u003e\u003e,\n\n        /// Output as JSON\n        #[arg(long)]\n        json: bool,\n\n        /// Output format: human (default), json, sarif\n        #[arg(long, value_name = \"FORMAT\")]\n        format: Option\u003cString\u003e,\n\n        /// Finding visibility level: regular (high-confidence only), pedantic (medium+), auditor (all)\n        #[arg(long, value_enum, default_value = \"regular\")]\n        persona: Persona,\n\n        /// Show all findings (no persona filtering, no aggregation)\n        #[arg(long)]\n        verbose: bool,\n\n        /// Run LLM triage on findings (requires OPENROUTER_API_KEY)\n        #[arg(long)]\n        triage: bool,\n\n        /// Show what would be sent to LLM without making API calls\n        #[arg(long)]\n        triage_dry_run: bool,\n    },\n\n    /// Auto-fix security issues\n    Fix {\n        /// Path to the project root\n        #[arg(default_value = \".\")]\n        path: PathBuf,\n\n        /// Preview changes without writing\n        #[arg(long)]\n        dry_run: bool,\n    },\n\n    /// Manage network baselines\n    Baseline {\n        #[command(subcommand)]\n        action: BaselineAction,\n    },\n\n    /// Monitor network activity of a command\n    Monitor {\n        /// Record connections as expected (learning mode)\n        #[arg(long)]\n        learn: bool,\n\n        /// Fail on unexpected connections\n        #[arg(long)]\n        strict: bool,\n\n        /// Output as JSON\n        #[arg(long)]\n        json: bool,\n\n        /// Path to baseline file\n        #[arg(long)]\n        baseline: Option\u003cPathBuf\u003e,\n\n        /// Command and arguments to monitor\n        #[arg(trailing_var_arg = true, required = true)]\n        command: Vec\u003cString\u003e,\n    },\n\n    /// Pre-install threat analysis\n    Preflight {\n        /// Path to the project root\n        #[arg(default_value = \".\")]\n        path: PathBuf,\n\n        /// Output as JSON\n        #[arg(long)]\n        json: bool,\n    },\n\n    /// Manage detection rules\n    Rules {\n        #[command(subcommand)]\n        action: RulesAction,\n    },\n\n    /// Verify depsec's own integrity\n    SelfCheck {\n        /// Path to the project root\n        #[arg(default_value = \".\")]\n        path: PathBuf,\n    },\n\n    /// Generate shell aliases for invisible protection\n    ShellHook,\n\n    /// Generate SVG scorecard image\n    Scorecard {\n        /// Path to the project root\n        #[arg(default_value = \".\")]\n        path: PathBuf,\n\n        /// Output file (default: depsec-scorecard.svg)\n        #[arg(short, long, default_value = \"depsec-scorecard.svg\")]\n        output: PathBuf,\n    },\n\n    /// Protected package install — preflight + monitor + report\n    InstallGuard {\n        /// Output as JSON\n        #[arg(long)]\n        json: bool,\n\n        /// Command and arguments to run (e.g., npm install lodash)\n        #[arg(trailing_var_arg = true, required = true)]\n        command: Vec\u003cString\u003e,\n    },\n\n    /// Deep security audit of a specific package\n    Audit {\n        /// Package name to audit (e.g., shelljs, @scope/pkg)\n        package: String,\n\n        /// Path to the project root\n        #[arg(long, default_value = \".\")]\n        path: PathBuf,\n\n        /// Preview what would be analyzed without calling LLM\n        #[arg(long)]\n        dry_run: bool,\n\n        /// Maximum budget in USD\n        #[arg(long, default_value = \"5.0\")]\n        budget: f64,\n    },\n\n    /// Install/uninstall git pre-commit hook for secret detection\n    Hook {\n        #[command(subcommand)]\n        action: HookAction,\n    },\n\n    /// Check staged files for secrets (used by pre-commit hook)\n    SecretsCheck {\n        /// Only check staged files (for pre-commit hook)\n        #[arg(long)]\n        staged: bool,\n\n        /// Path to the project root\n        #[arg(default_value = \".\")]\n        path: PathBuf,\n    },\n\n    /// Manage build attestations\n    Attestation {\n        #[command(subcommand)]\n        action: AttestationAction,\n    },\n\n    /// Manage triage cache\n    Cache {\n        #[command(subcommand)]\n        action: CacheAction,\n    },\n\n    /// Output badge markdown\n    Badge {\n        /// Path to the project root\n        #[arg(default_value = \".\")]\n        path: PathBuf,\n    },\n}\n\n#[derive(Subcommand)]\nenum HookAction {\n    /// Install pre-commit hook in .git/hooks/\n    Install,\n    /// Remove the pre-commit hook\n    Uninstall,\n}\n\n#[derive(Subcommand)]\nenum AttestationAction {\n    /// Verify the build attestation\n    Verify {\n        /// Path to the project root\n        #[arg(default_value = \".\")]\n        path: PathBuf,\n    },\n    /// Show a one-line attestation summary (for PR comments)\n    Summary {\n        /// Path to the project root\n        #[arg(default_value = \".\")]\n        path: PathBuf,\n    },\n}\n\n#[derive(Subcommand)]\nenum CacheAction {\n    /// Clear all cached triage results\n    Clear,\n    /// Show cache statistics\n    Stats,\n}\n\n#[derive(Subcommand)]\nenum RulesAction {\n    /// List all active rules\n    List,\n\n    /// Update rules from community repository\n    Update,\n\n    /// Add a custom rule file\n    Add {\n        /// Path to the rule file\n        path: PathBuf,\n    },\n}\n\n#[derive(Subcommand)]\nenum BaselineAction {\n    /// Generate a network baseline file\n    Init {\n        /// Path to the project root\n        #[arg(default_value = \".\")]\n        path: PathBuf,\n    },\n\n    /// Compare CI run against baseline\n    Check {\n        /// Path to the capture file\n        #[arg(long)]\n        capture: Option\u003cPathBuf\u003e,\n    },\n}\n\nfn use_color(no_color_flag: bool) -\u003e bool {\n    if no_color_flag {\n        return false;\n    }\n    if std::env::var(\"NO_COLOR\").is_ok() {\n        return false;\n    }\n    true\n}\n\nfn main() -\u003e ExitCode {\n    let cli = Cli::parse();\n    let color = use_color(cli.no_color);\n\n    match cli.command {\n        Commands::Scan {\n            path,\n            checks,\n            json,\n            format,\n            persona,\n            verbose,\n            triage,\n            triage_dry_run,\n        } =\u003e {\n            let root = match path.canonicalize() {\n                Ok(p) =\u003e p,\n                Err(e) =\u003e {\n                    eprintln!(\"Error: invalid path '{}': {e}\", path.display());\n                    return ExitCode::from(2);\n                }\n            };\n\n            let config = config::load_config(\u0026root);\n            let filter = checks.as_deref();\n\n            match scanner::run_scan(\u0026root, \u0026config, filter) {\n                Ok(mut report) =\u003e {\n                    // Tag pattern findings with reachability\n                    let app_imports = reachability::scan_app_imports(\u0026root);\n                    for result in \u0026mut report.results {\n                        for finding in \u0026mut result.findings {\n                            if let Some(pkg) = \u0026finding.package {\n                                finding.reachable = Some(app_imports.packages.contains(pkg));\n                            }\n                        }\n                    }\n\n                    let fmt = format\n                        .as_deref()\n                        .unwrap_or(if json { \"json\" } else { \"human\" });\n                    match fmt {\n                        \"json\" =\u003e match output::render_json(\u0026report) {\n                            Ok(json_str) =\u003e println!(\"{json_str}\"),\n                            Err(e) =\u003e {\n                                eprintln!(\"Error rendering JSON: {e}\");\n                                return ExitCode::from(2);\n                            }\n                        },\n                        \"sarif\" =\u003e match sarif::render_sarif(\u0026report) {\n                            Ok(sarif_str) =\u003e println!(\"{sarif_str}\"),\n                            Err(e) =\u003e {\n                                eprintln!(\"Error rendering SARIF: {e}\");\n                                return ExitCode::from(2);\n                            }\n                        },\n                        _ =\u003e {\n                            print!(\"{}\", output::render_human(\u0026report, color, persona, verbose));\n                        }\n                    }\n\n                    // LLM triage (optional)\n                    if triage || triage_dry_run {\n                        // Collect visible findings for triage\n                        let visible_findings: Vec\u003ccrate::checks::Finding\u003e = report\n                            .results\n                            .iter()\n                            .flat_map(|r| \u0026r.findings)\n                            .filter(|f| verbose || output::finding_visible(f, persona))\n                            .cloned()\n                            .collect();\n\n                        if visible_findings.is_empty() {\n                            eprintln!(\"No findings to triage.\");\n                        } else if triage_dry_run {\n                            // Dry run: show what would be sent, no API calls needed\n                            triage::dry_run_findings(\u0026visible_findings, \u0026root, \u0026config.triage);\n                        } else {\n                            // Real triage: requires API key\n                            let client = match llm::LlmClient::from_config(\u0026config.triage) {\n                                Some(c) =\u003e c,\n                                None =\u003e {\n                                    llm::print_setup_instructions();\n                                    return ExitCode::from(2);\n                                }\n                            };\n\n                            let est_tokens = visible_findings.len() as u32 * 2000;\n                            let est_cost = client\n                                .estimate_cost(est_tokens, visible_findings.len() as u32 * 200);\n                            eprintln!(\n                                \"\\nTriaging {} findings with {} (~${:.4} estimated)...\\n\",\n                                visible_findings.len(),\n                                client.model(),\n                                est_cost,\n                            );\n\n                            let results = triage::triage_findings(\n                                \u0026visible_findings,\n                                \u0026root,\n                                \u0026client,\n                                \u0026config.triage,\n                            );\n\n                            print!(\n                                \"{}\",\n                                triage::render_triage_results(\u0026visible_findings, \u0026results, color)\n                            );\n                        }\n                    }\n\n                    // Exit code respects persona: only visible findings cause non-zero exit\n                    let has_visible_findings = report.results.iter().any(|r| {\n                        r.findings\n                            .iter()\n                            .any(|f| verbose || output::finding_visible(f, persona))\n                    });\n\n                    if has_visible_findings {\n                        ExitCode::from(1)\n                    } else {\n                        ExitCode::SUCCESS\n                    }\n                }\n                Err(e) =\u003e {\n                    eprintln!(\"Error: {e}\");\n                    ExitCode::from(2)\n                }\n            }\n        }\n\n        Commands::Fix { path, dry_run } =\u003e {\n            let root = match path.canonicalize() {\n                Ok(p) =\u003e p,\n                Err(e) =\u003e {\n                    eprintln!(\"Error: invalid path '{}': {e}\", path.display());\n                    return ExitCode::from(2);\n                }\n            };\n\n            match fixer::fix_workflow_pinning(\u0026root, dry_run) {\n                Ok(results) =\u003e {\n                    fixer::print_fix_results(\u0026results, dry_run);\n                    let any_failed = results.iter().any(|r| !r.applied);\n                    if any_failed {\n                        ExitCode::from(1)\n                    } else {\n                        ExitCode::SUCCESS\n                    }\n                }\n                Err(e) =\u003e {\n                    eprintln!(\"Error: {e}\");\n                    ExitCode::from(2)\n                }\n            }\n        }\n\n        Commands::Monitor {\n            learn,\n            strict,\n            json,\n            baseline,\n            command,\n        } =\u003e match monitor::run_monitor(\u0026command, baseline.as_deref(), learn, json) {\n            Ok(result) =\u003e {\n                let has_critical = !result.critical.is_empty();\n                let has_unexpected = !result.unexpected.is_empty();\n                if has_critical || (strict \u0026\u0026 has_unexpected) {\n                    ExitCode::from(1)\n                } else {\n                    ExitCode::from(result.exit_code as u8)\n                }\n            }\n            Err(e) =\u003e {\n                eprintln!(\"Error: {e}\");\n                ExitCode::from(2)\n            }\n        },\n\n        Commands::Preflight { path, json } =\u003e {\n            let root = match path.canonicalize() {\n                Ok(p) =\u003e p,\n                Err(e) =\u003e {\n                    eprintln!(\"Error: invalid path '{}': {e}\", path.display());\n                    return ExitCode::from(2);\n                }\n            };\n\n            match preflight::run_preflight(\u0026root, json) {\n                Ok(result) =\u003e {\n                    let has_high = result.findings.iter().any(|f| {\n                        matches!(\n                            f.severity,\n                            crate::checks::Severity::Critical | crate::checks::Severity::High\n                        )\n                    });\n                    if has_high {\n                        ExitCode::from(1)\n                    } else {\n                        ExitCode::SUCCESS\n                    }\n                }\n                Err(e) =\u003e {\n                    eprintln!(\"Error: {e}\");\n                    ExitCode::from(2)\n                }\n            }\n        }\n\n        Commands::Rules { action } =\u003e {\n            let root = std::env::current_dir().unwrap_or_else(|_| \".\".into());\n            match action {\n                RulesAction::List =\u003e {\n                    rules::list_rules(\u0026root);\n                    ExitCode::SUCCESS\n                }\n                RulesAction::Update =\u003e match rules::update_rules(\u00 ":["/","Users","razvan","Development","depsec","src","output.rs"],"content":"use std::collections::{BTreeMap, HashSet};\n\nuse crate::checks::{CheckResult, Confidence, Finding, Severity};\nuse crate::scoring::{compute_grade, compute_total_score, Grade};\nuse crate::Persona;\n\n/// Rule metadata for the glossary and inline display\nstruct RuleInfo {\n    name: \u0026'static str,\n    narrative: \u0026'static str,\n}\n\nfn rule_info(rule_id: \u0026str) -\u003e Option\u003cRuleInfo\u003e {\n    Some(match rule_id {\n        \"DEPSEC-P001\" =\u003e RuleInfo { name: \"Shell Execution\", narrative: \"Calls child_process.exec/spawn with variable arguments. If user-controlled, enables Remote Code Execution. Common in build tools where it's expected.\" },\n        \"DEPSEC-P002\" =\u003e RuleInfo { name: \"Encoded Execution\", narrative: \"Decodes base64/atob data and passes it to eval, exec, or Function. This is the #1 obfuscation pattern in npm malware. Legitimate uses are rare.\" },\n        \"DEPSEC-P003\" =\u003e RuleInfo { name: \"Raw IP Network Call\", narrative: \"Makes HTTP requests to a hardcoded IP address. Malware uses raw IPs to avoid DNS blocking. Could also be local dev/testing.\" },\n        \"DEPSEC-P004\" =\u003e RuleInfo { name: \"Credential Harvesting\", narrative: \"Reads files from ~/.ssh, ~/.aws, ~/.env, or ~/.gnupg. No legitimate package needs your credentials.\" },\n        \"DEPSEC-P005\" =\u003e RuleInfo { name: \"Steganographic Payload\", narrative: \"Reads binary files (.wav, .png, .ico) and extracts bytes. Known malware technique: hide payloads in media files.\" },\n        \"DEPSEC-P006\" =\u003e RuleInfo { name: \"Install Script Download\", narrative: \"Install script makes network calls. These run automatically during npm install with full system access.\" },\n        \"DEPSEC-P007\" =\u003e RuleInfo { name: \"Encoded Payload\", narrative: \"High-entropy string (\u003e4.5 bits/char). Could be base64 data, crypto keys, or obfuscated code. Also common in compression tables.\" },\n        \"DEPSEC-P008\" =\u003e RuleInfo { name: \"Dynamic Code Construction\", narrative: \"Uses new Function() to create code from strings. Standard for template engines (ejs, pug). Dangerous if input is user-controlled.\" },\n        \"DEPSEC-P009\" =\u003e RuleInfo { name: \"Python Startup Injection\", narrative: \"A .pth file with executable code. Python .pth files run on every interpreter startup — a powerful malware persistence mechanism.\" },\n        \"DEPSEC-P010\" =\u003e RuleInfo { name: \"Cloud Credential Probing\", narrative: \"Accesses cloud instance metadata (169.254.169.254). IMDS provides IAM credentials. Could steal cloud credentials.\" },\n        \"DEPSEC-P011\" =\u003e RuleInfo { name: \"Environment Exfiltration\", narrative: \"Serializes process.env to JSON. Environment variables often contain API keys and secrets.\" },\n        \"DEPSEC-P012\" =\u003e RuleInfo { name: \"Suspicious Install Hook\", narrative: \"package.json install script contains suspicious commands. Install hooks run with full system access.\" },\n        _ =\u003e return None,\n    })\n}\n\n/// Get a short rule label like \"P001: Shell Execution\"\nfn rule_label(rule_id: \u0026str) -\u003e String {\n    let short = rule_id.strip_prefix(\"DEPSEC-\").unwrap_or(rule_id);\n    match rule_info(rule_id) {\n        Some(info) =\u003e format!(\"{}: {}\", short, info.name),\n        None =\u003e short.to_string(),\n    }\n}\n\n#[derive(Debug, Clone, serde::Serialize)]\npub struct ScanReport {\n    pub version: String,\n    pub project_name: String,\n    pub results: Vec\u003cCheckResult\u003e,\n    pub total_score: f64,\n    pub grade: Grade,\n}\n\nimpl ScanReport {\n    pub fn new(project_name: String, results: Vec\u003cCheckResult\u003e) -\u003e Self {\n        let total_score = compute_total_score(\u0026results);\n        let grade = compute_grade(total_score);\n        Self {\n            version: env!(\"CARGO_PKG_VERSION\").to_string(),\n            project_name,\n            results,\n            total_score,\n            grade,\n        }\n    }\n}\n\n/// Check if a finding is visible under the given persona filter\npub fn finding_visible(finding: \u0026Finding, persona: Persona) -\u003e bool {\n    finding_passes_persona(finding, persona)\n}\n\nfn finding_passes_persona(finding: \u0026Finding, persona: Persona) -\u003e bool {\n    let min_confidence = match persona {\n        Persona::Regular =\u003e Confidence::High,\n        Persona::Pedantic =\u003e Confidence::Medium,\n        Persona::Auditor =\u003e Confidence::Low,\n    };\n\n    match finding.confidence {\n        // Findings without confidence (non-pattern checks) always pass\n        None =\u003e true,\n        Some(conf) =\u003e conf \u003e= min_confidence,\n    }\n}\n\npub fn render_human(\n    report: \u0026ScanReport,\n    use_color: bool,\n    persona: Persona,\n    verbose: bool,\n) -\u003e String {\n    let mut out = String::new();\n\n    // Recompute score with persona-filtered findings for a fair grade\n    let filtered_results: Vec\u003cCheckResult\u003e = report\n        .results\n        .iter()\n        .map(|r| {\n            let filtered_findings: Vec\u003cFinding\u003e = r\n                .findings\n                .iter()\n                .filter(|f| verbose || finding_passes_persona(f, persona))\n                .cloned()\n                .collect();\n            CheckResult::new(\n                r.category.clone(),\n                filtered_findings,\n                r.max_score,\n                r.pass_messages.clone(),\n            )\n        })\n        .collect();\n    let filtered_score = compute_total_score(\u0026filtered_results);\n    let filtered_grade = compute_grade(filtered_score);\n\n    out.push_str(\u0026format!(\n        \"depsec v{} — Supply Chain Security Scanner\\n\\n\",\n        report.version\n    ));\n    out.push_str(\u0026format!(\"Project: {}\\n\", report.project_name));\n    out.push_str(\u0026format!(\n        \"Grade: {} ({:.1}/10)\\n\",\n        format_grade(\u0026filtered_grade, use_color),\n        filtered_score / 10.0,\n    ));\n\n    let dim = if use_color { \"\\x1b[90m\" } else { \"\" };\n    let reset = if use_color { \"\\x1b[0m\" } else { \"\" };\n\n    for result in \u0026report.results {\n        out.push('\\n');\n        out.push_str(\u0026format!(\"[{}]\\n\", capitalize(\u0026result.category)));\n\n        for msg in \u0026result.pass_messages {\n            out.push_str(\u0026format!(\n                \"  {} {}\\n\",\n                if use_color {\n                    \"\\x1b[32m✓\\x1b[0m\"\n                } else {\n                    \"✓\"\n                },\n                msg\n            ));\n        }\n\n        // Special collapsed rendering for deps category\n        if result.category == \"deps\" \u0026\u0026 !result.findings.is_empty() \u0026\u0026 !verbose {\n            render_deps_summary(\u0026mut out, \u0026result.findings, use_color, dim, reset);\n            continue;\n        }\n\n        let mut hidden_count = 0usize;\n\n        // Separate visible from hidden findings\n        let visible: Vec\u003c\u0026Finding\u003e = result\n            .findings\n            .iter()\n            .filter(|f| {\n                if verbose || finding_passes_persona(f, persona) {\n                    true\n                } else {\n                    hidden_count += 1;\n                    false\n                }\n            })\n            .collect();\n\n        // Check if this category has package-able findings for aggregation\n        let has_packages = visible.iter().any(|f| f.package.is_some());\n\n        if !verbose \u0026\u0026 has_packages {\n            // Aggregate mode: group by package, split by reachability\n            let mut runtime_pkgs: BTreeMap\u003cString, Vec\u003c\u0026Finding\u003e\u003e = BTreeMap::new();\n            let mut build_pkgs: BTreeMap\u003cString, Vec\u003c\u0026Finding\u003e\u003e = BTreeMap::new();\n            let mut no_package: Vec\u003c\u0026Finding\u003e = Vec::new();\n\n            for f in \u0026visible {\n                match \u0026f.package {\n                    Some(pkg) =\u003e {\n                        if f.reachable == Some(true) {\n                            runtime_pkgs.entry(pkg.clone()).or_default().push(f);\n                        } else {\n                            build_pkgs.entry(pkg.clone()).or_default().push(f);\n                        }\n                    }\n                    None =\u003e no_package.push(f),\n                }\n            }\n\n            // Render non-packaged findings individually\n            for finding in \u0026no_package {\n                render_finding(\u0026mut out, finding, use_color);\n            }\n\n            let red = if use_color { \"\\x1b[31m\" } else { \"\" };\n            let green = if use_color { \"\\x1b[32m\" } else { \"\" };\n\n            // Runtime findings — prominent\n            if !runtime_pkgs.is_empty() {\n                let runtime_count: usize = runtime_pkgs.values().map(|v| v.len()).sum();\n                out.push_str(\u0026format!(\n                    \"\\n  {red}ACTION REQUIRED{reset} — {count} finding{s} in {pkg_count} package{ps} your app imports:\\n\\n\",\n                    count = runtime_count,\n                    s = if runtime_count == 1 { \"\" } else { \"s\" },\n                    pkg_count = runtime_pkgs.len(),\n                    ps = if runtime_pkgs.len() == 1 { \"\" } else { \"s\" },\n                ));\n\n                for (pkg, findings) in \u0026runtime_pkgs {\n                    render_package_aggregate(\u0026mut out, pkg, findings, use_color, dim, reset);\n                }\n            }\n\n            // Build-only findings — collapsed\n            if !build_pkgs.is_empty() {\n                let build_count: usize = build_pkgs.values().map(|v| v.len()).sum();\n                let pkg_names: Vec\u003c\u0026str\u003e = build_pkgs.keys().map(|s| s.as_str()).collect();\n\n                out.push_str(\u0026format!(\n                    \"\\n  {green}BUILD TOOLS{reset} — {count} finding{s} in {pkg_count} package{ps} not imported by your app:\\n\",\n                    count = build_count,\n                    s = if build_count == 1 { \"\" } else { \"s\" },\n                    pkg_count = build_pkgs.len(),\n                    ps = if build_pkgs.len() == 1 { \"\" } else { \"s\" },\n                ));\n\n                // Show just package names, collapsed\n                let display_names: Vec\u003c\u0026str\u003e = pkg_names.iter().take(8).copied().collect();\n                let more = if pkg_names.len() \u003e 8 {\n                    format!(\", +{} more\", pkg_names.len() - 8)\n                } else {\n                    String::new()\n                };\n                out.push_str(\u0026format!(\n                    \"    {dim}{}{more}{reset}\\n\",\n                    display_names.join(\", \"),\n                ));\n                out.push_str(\u0026format!(\n                    \"    {dim}These run during build/dev only, not in production (use --verbose for details){reset}\\n\",\n                ));\n            }\n\n            // If neither runtime nor build had findings, show pass\n            if runtime_pkgs.is_empty() \u0026\u0026 build_pkgs.is_empty() \u0026\u0026 no_package.is_empty() {\n                out.push_str(\u0026format!(\"  {green}✓{reset} No suspicious patterns found\\n\",));\n            }\n        } else {\n            // Verbose mode or no packages: render individually\n            for finding in \u0026visible {\n                render_finding(\u0026mut out, finding, use_color);\n            }\n        }\n\n        if hidden_count \u003e 0 {\n            let persona_hint = match persona {\n                Persona::Regular =\u003e \"--persona pedantic\",\n                Persona::Pedantic =\u003e \"--persona auditor\",\n                Persona::Auditor =\u003e \"--verbose\",\n            };\n            out.push_str(\u0026format!(\n                \"  {dim}+{hidden_count} hidden findings (use {persona_hint} to see){reset}\\n\"\n            ));\n        }\n    }\n\n    let fixable_count = report\n        .results\n        .iter()\n        .flat_map(|r| \u0026r.findings)\n        .filter(|f| f.auto_fixable)\n        .count();\n\n    if fixable_count \u003e 0 {\n        out.push_str(\u0026format!(\n            \"\\nRun 'depsec fix' to auto-fix {} issue{}.\\n\",\n            fixable_count,\n            if fixable_count == 1 { \"\" } else { \"s\" }\n        ));\n    }\n\n    // ASCII scorecard — use filtered results for fair display\n    let filtered_report = ScanReport {\n        version: report.version.clone(),\n        project_name: report.project_name.clone(),\n        results: filtered_results,\n        total_score: filtered_score,\n        grade: filtered_grade,\n    };\n    out.push('\\n');\n    out.push_str(\u0026render_ascii_scorecard(\u0026filtered_report, use_color));\n\n    // Rule glossary — only rules that triggered in this scan\n    let glossary = render_rule_glossary(report, use_color);\n    if !glossary.is_empty() {\n        out.push('\\n');\n        out.push_str(\u0026glossary);\n    }\n\n    out\n}\n\nfn render_rule_glossary(report: \u0026ScanReport, use_color: bool) -\u003e String {\n    let dim = if use_color { \"\\x1b[90m\" } else { \"\" };\n    let bold = if use_color { \"\\x1b[1m\" } else { \"\" };\n    let reset = if use_color { \"\\x1b[0m\" } else { \"\" };\n\n    // Collect unique P-rule IDs that triggered\n    let triggered_ids: HashSet\u003cString\u003e = report\n        .results\n        .iter()\n        .flat_map(|r| \u0026r.findings)\n        .filter(|f| f.rule_id.starts_with(\"DEPSEC-P\"))\n        .map(|f| f.rule_id.clone())\n        .collect();\n\n    let mut triggered: Vec\u003c(String, RuleInfo)\u003e = triggered_ids\n        .into_iter()\n        .filter_map(|id| rule_info(\u0026id).map(|info| (id, info)))\n        .collect();\n    triggered.sort_by(|a, b| a.0.cmp(\u0026b.0));\n\n    if triggered.is_empty() {\n        return String::new();\n    }\n\n    let mut out = format!(\"{bold}[Rule Guide]{reset}\\n\");\n\n    for (rule_id, info) in triggered.iter() {\n        let short = rule_id.strip_prefix(\"DEPSEC-\").unwrap_or(rule_id);\n        out.push_str(\u0026format!(\"  {bold}{short}{reset}  {}\\n\", info.name));\n        // Wrap narrative to ~72 chars with indent\n        for line in wrap_text(info.narrative, 70) {\n            out.push_str(\u0026format!(\"  {dim}    {line}{reset}\\n\"));\n        }\n        out.push('\\n');\n    }\n\n    out\n}\n\nfn wrap_text(text: \u0026str, width: usize) -\u003e Vec\u003cString\u003e {\n    let mut lines = Vec::new();\n    let mut current = String::new();\n\n    for word in text.split_whitespace() {\n        if current.is_empty() {\n            current = word.to_string();\n        } else if current.len() + 1 + word.len() \u003e width {\n            lines.push(current);\n            current = word.to_string();\n        } else {\n            current.push(' ');\n            current.push_str(word);\n        }\n    }\n    if !current.is_empty() {\n        lines.push(current);\n    }\n    lines\n}\n\npub fn render_json(report: \u0026ScanReport) -\u003e anyhow::Result\u003cString\u003e {\n    Ok(serde_json::to_string_pretty(report)?)\n}\n\nfn render_deps_summary(\n    out: \u0026mut String,\n    findings: \u0026[Finding],\n    use_color: bool,\n    dim: \u0026str,\n    reset: \u0026str,\n) {\n    let total = findings.len();\n    let critical = findings\n        .iter()\n        .filter(|f| f.severity == Severity::Critical)\n        .count();\n    let high = findings\n        .iter()\n        .filter(|f| f.severity == Severity::High)\n        .count();\n    let medium = findings\n        .iter()\n        .filter(|f| f.severity == Severity::Medium)\n        .count();\n    let low = findings\n        .iter()\n        .filter(|f| f.severity == Severity::Low)\n        .count();\n\n    // Count unique packages from finding messages (extract package name from CVE messages)\n    let malware = findings\n        .iter()\n        .filter(|f| f.rule_id.starts_with(\"DEPSEC-MAL\"))\n        .count();\n    let cves = total - malware;\n\n    let icon = if critical \u003e 0 || malware \u003e 0 || high \u003e 0 {\n        if use_color {\n            \"\\x1b[31m✗\\x1b[0m\"\n        } else {\n            \"✗\"\n        }\n    } else if use_color {\n        \"\\x1b[33m⚠\\x1b[0m\"\n    } else {\n        \"⚠\"\n    };\n\n    out.push_str(\u0026format!(\n        \"  {icon} {cves} known vulnerabilit{ies}\\n\",\n        ies = if cves == 1 { \"y\" } else { \"ies\" },\n    ));\n\n    if malware \u003e 0 {\n        let red = if use_color { \"\\x1b[31m\" } else { \"\" };\n        out.push_str(\u0026format!(\n            \"    {red}MALWARE: {malware} malicious package{s} — REMOVE IMMEDIATELY{reset}\\n\",\n            s = if malware == 1 { \"\" } else { \"s\" },\n        ));\n    }\n\n    // Severity breakdown\n    let mut parts = Vec::new();\n    if critical \u003e 0 {\n        parts.push(format!(\"{critical} critical\"));\n    }\n    if high \u003e 0 {\n        parts.push(format!(\"{high} high\"));\n    }\n    if medium \u003e 0 {\n        parts.push(format!(\"{medium} medium\"));\n    }\n    if low \u003e 0 {\n        parts.push(format!(\"{low} low\"));\n    }\n    out.push_str(\u0026format!(\"    {dim}Severity: {}{reset}\\n\", parts.join(\", \")));\n\n    // Suggestion\n    out.push_str(\u0026format!(\n        \"    → Run {dim}npm audit fix{reset} or {dim}cargo audit{reset} to resolve\\n\"\n    ));\n    out.push_str(\u0026format!(\n        \"    {dim}Use --verbose for full advisory list{reset}\\n\"\n    ));\n}\n\nfn render_package_aggregate(\n    out: \u0026mut String,\n    pkg: \u0026str,\n    findings: \u0026[\u0026Finding],\n    use_color: bool,\n    dim: \u0026str,\n    reset: \u0026str,\n) {\n    let count = findings.len();\n    let max_severity = findings\n        .iter()\n        .map(|f| f.severity)\n        .max()\n        .unwrap_or(Severity::Low);\n\n    let icon = match max_severity {\n        Severity::Critical | Severity::High =\u003e {\n            if use_color {\n                \"\\x1b[31m✗\\x1b[0m\"\n            } else {\n                \"✗\"\n            }\n        }\n        _ =\u003e {\n            if use_color {\n                \"\\x1b[33m⚠\\x1b[0m\"\n            } else {\n                \"⚠\"\n            }\n        }\n    };\n\n    let mut rules: Vec\u003cString\u003e = findings\n        .iter()\n        .map(|f| f.rule_id.as_str())\n        .collect::\u003cHashSet\u003c_\u003e\u003e()\n        .into_iter()\n        .map(rule_label)\n        .collect();\n    rules.sort();\n\n    out.push_str(\u0026format!(\n        \"  {icon} {pkg} — {count} finding{s} ({rules})\\n\",\n        s = if count == 1 { \"\" } else { \"s\" },\n        rules = rules.join(\", \"),\n    ));\n\n    // Show top 3 locations\n    let top_locations: Vec\u003cString\u003e = findings\n        .iter()\n        .take(3)\n        .filter_map(|f| {\n            f.file.as_ref().map(|file| match f.line {\n                Some(l) =\u003e format!(\"{file}:{l}\"),\n                None =\u003e file.clone(),\n            })\n        })\n        .collect();\n    if !top_locations.is_empty() {\n        let more = if count \u003e 3 {\n            format!(\" +{} more\", count - 3)\n        } else {\n            String::new()\n        };\n        out.push_str(\u0026format!(\n            \"    {dim}Top: {}{more}{reset}\\n\",\n            top_locations.join(\", \"),\n        ));\n    }\n\n    if let Some(suggestion) = \u0026findings[0].suggestion {\n        out.push_str(\u0026format!(\"    → {suggestion}\\n\"));\n    }\n}\n\nfn render_finding(out: \u0026mut String, finding: \u0026Finding, use_color: bool) {\n    let icon = match finding.severity {\n        Severity::Critical | Severity::High =\u003e {\n            if use_color {\n                \"\\x1b[31m✗\\x1b[0m\"\n            } else {\n                \"✗\"\n            }\n        }\n        Severity::Medium | Severity::Low =\u003e {\n            if use_color {\n                \"\\x1b[33m⚠\\x1b[0m\"\n            } else {\n                \"⚠\"\n            }\n        }\n    };\n\n    let location = match (\u0026finding.file, finding.line) {\n        (Some(f), Some(l)) =\u003e format!(\" ({f}:{l})\"),\n        (Some(f), None) =\u003e format!(\" ({f})\"),\n        _ =\u003e String::new(),\n    };\n\n    out.push_str(\u0026format!(\"  {} {}{}\\n\", icon, finding.message, location));\n\n    if let Some(suggestion) = \u0026finding.suggestion {\n        out.push_str(\u0026format!(\"    → {suggestion}\\n\"));\n    }\n}\n\nfn format_grade(grade: \u0026Grade, use_color: bool) -\u003e String {\n    if !use_color {\n        return grade.to_string();\n    }\n    let color = match grade {\n        Grade::A =\u003e \"\\x1b[32m\",\n        Grade::B =\u003e \"\\x1b[32m\",\n        Grade::C =\u003e \"\\x1b[33m\",\n        Grade::D =\u003e \"\\x1b[33m\",\n        Grade::F =\u003e \"\\x1b[31m\",\n    };\n    format!(\"{color}{grade}\\x1b[0m\")\n}\n\nfn capitalize(s: \u0026str) -\u003e String {\n    let mut c = s.chars();\n    match c.next() {\n        None =\u003e String::new(),\n        Some(f) =\u003e f.to_uppercase().collect::\u003cString\u003e() + c.as_str(),\n    }\n}\n\nfn render_ascii_scorecard(report: \u0026ScanReport, use_color: bool) -\u003e String {\n    let bar_width = 20;\n    let box_width = 52;\n    let border = \"─\".repeat(box_width);\n\n    let (green, yellow, red, dim, bold, reset) = if use_color {\n        (\n            \"\\x1b[32m\", \"\\x1b[33m\", \"\\x1b[31m\", \"\\x1b[90m\", \"\\x1b[1m\", \"\\x1b[0m\",\n        )\n    } else {\n        (\"\", \"\", \"\", \"\", \"\", \"\")\n    };\n\n    let grade_color = match report.grade {\n        Grade::A | Grade::B =\u003e green,\n        Grade::C | Grade::D =\u003e yellow,\n        Grade::F =\u003e red,\n    };\n\n    let mut out = String::new();\n\n    // Top border\n    out.push_str(\u0026format!(\"{dim}┌{border}┐{reset}\\n\"));\n\n    // Title + score\n    let score_str = format!(\"{:.1}/10\", report.total_score / 10.0);\n    let title = \"DEPSEC SCORECARD\";\n    let padding = box_width - title.len() - score_str.len() - 6;\n    out.push_str(\u0026format!(\n        \"{dim}│{reset} {bold}{title}{reset}{: \u003cpad$}{grade_color}{bold}{score}{reset} {grade_color}{grade}{reset} {dim}│{reset}\\n\",\n        \"\",\n        pad = padding,\n        title = title,\n        score = score_str,\n        grade = report.grade,\n    ));\n\n    // Separator\n    out.push_str(\u0026format!(\"{dim}├{border}┤{reset}\\n\"));\n\n    // Category rows\n    for result in \u0026report.results {\n        let pct = if result.max_score \u003e 0.0 {\n            (result.score / result.max_score * 100.0).round() as u32\n        } else {\n            100\n        };\n\n        let filled = (pct as usize * bar_width) / 100;\n        let empty = bar_width - filled;\n        let bar_color = if pct \u003e= 90 {\n            green\n        } else if pct \u003e= 60 {\n            yellow\n        } else {\n            red\n        };\n\n        let bar = format!(\n            \"{bar_color}{}{dim}{}{reset}\",\n            \"█\".repeat(filled),\n            \"░\".repeat(empty),\n        );\n\n        let name = capitalize(\u0026result.category);\n        let status = if result.findings.is_empty() {\n            format!(\"{green}✓{reset}\")\n        } else {\n            format!(\"{red}{}{reset}\", result.findings.len())\n        };\n\n        out.push_str(\u0026format!(\n            \"{dim}│{reset} {name:\u003c12} {bar} {pct:\u003e3}% {status:\u003e3} {dim}│{reset}\\n\",\n        ));\n    }\n\n    // Bottom border\n    out.push_str(\u0026format!(\"{dim}└{border}┘{reset}\\n\"));\n\n    out\n}\n\n#[cfg(test)]\nmod tests {\n    use super::*;\n\n    #[test]\n    fn test_scan_report_new() {\n        let report = ScanReport::new(\"test-project\".into(), vec![]);\n        assert_eq!(report.grade, Grade::A);\n        assert_eq!(report.total_score, 100.0);\n        assert_eq!(report.project_name, \"test-project\");\n    }\n\n    #[test]\n    fn test_render_human_empty() {\n        let report = ScanReport::new(\"test-project\".into(), vec![]);\n        let output = render_human(\u0026report, false, Persona::Auditor, false);\n        assert!(output.contains(\"test-project\"));\n        assert!(output.contains(\"Grade: A\"));\n    }\n\n    #[test]\n    fn test_render_json_valid() {\n        let report = ScanReport::new(\"test-project\".into(), vec![]);\n        let json = render_json(\u0026report).unwrap();\n        let parsed: serde_json::Value = serde_json::from_str(\u0026json).unwrap();\n        assert_eq!(parsed[\"grade\"], \"A\");\n        assert_eq!(parsed[\"project_name\"], \"test-project\");\n    }\n\n    #[test]\n    fn test_capitalize() {\n        assert_eq!(capitalize(\"workflows\"), \"Workflows\");\n        assert_eq!(capitalize(\"deps\"), \"Deps\");\n        assert_eq!(capitalize(\"\"), \"\");\n    }\n}\n","traces":[{"line":13,"address":[],"length":0,"stats":{"Line":0}},{"line":14,"address":[],"length":0,"stats":{"Line":0}},{"line":15,"address":[],"length":0,"stats":{"Line":0}},{"line":16,"address":[],"length":0,"stats":{"Line":0}},{"line":17,"address":[],"length":0,"stats":{"Line":0}},{"line":18,"address":[],"length":0,"stats":{"Line":0}},{"line":19,"address":[],"length":0,"stats":{"Line":0}},{"line":20,"address":[],"length":0,"stats":{"Line":0}},{"line":21,"address":[],"length":0,"stats":{"Line":0}},{"line":22,"address":[],"length":0,"stats":{"Line":0}},{"line":23,"address":[],"length":0,"stats":{"Line":0}},{"line":24,"address":[],"length":0,"stats":{"Line":0}},{"line":25,"address":[],"length":0,"stats":{"Line":0}},{"line":26,"address":[],"length":0,"stats":{"Line":0}},{"line":27,"address":[],"length"
