","src","parsers","cargo_lock.rs"],"content":"use std::path::Path;\n\nuse anyhow::Context;\n\nuse super::{Ecosystem, Package};\n\n/// Parse Cargo.lock (supports v1, v2, and v3 formats).\n/// All formats use the same [[package]] table structure.\npub fn parse(path: \u0026Path) -\u003e anyhow::Result\u003cVec\u003cPackage\u003e\u003e {\n    let content = std::fs::read_to_string(path).context(\"Failed to read Cargo.lock\")?;\n    let parsed: toml::Value = toml::from_str(\u0026content).context(\"Failed to parse Cargo.lock\")?;\n\n    let packages = parsed\n        .get(\"package\")\n        .and_then(|p| p.as_array())\n        .map(|arr| {\n            arr.iter()\n                .filter_map(|entry| {\n                    let name = entry.get(\"name\")?.as_str()?.to_string();\n                    let version = entry.get(\"version\")?.as_str()?.to_string();\n                    Some(Package {\n                        name,\n                        version,\n                        ecosystem: Ecosystem::CratesIo,\n                    })\n                })\n                .collect()\n        })\n        .unwrap_or_default();\n\n    Ok(packages)\n}\n\n#[cfg(test)]\nmod tests {\n    use super::*;\n    use std::fs;\n    use tempfile::TempDir;\n\n    #[test]\n    fn test_parse_cargo_lock_v3() {\n        let dir = TempDir::new().unwrap();\n        let lock = dir.path().join(\"Cargo.lock\");\n        fs::write(\n            \u0026lock,\n            r#\"# This file is automatically @generated by Cargo.\n# It is not intended for manual editing.\nversion = 3\n\n[[package]]\nname = \"serde\"\nversion = \"1.0.200\"\nsource = \"registry+https://github.com/rust-lang/crates.io-index\"\n\n[[package]]\nname = \"regex\"\nversion = \"1.10.0\"\nsource = \"registry+https://github.com/rust-lang/crates.io-index\"\n\"#,\n        )\n        .unwrap();\n\n        let packages = parse(\u0026lock).unwrap();\n        assert_eq!(packages.len(), 2);\n        assert_eq!(packages[0].name, \"serde\");\n        assert_eq!(packages[0].version, \"1.0.200\");\n        assert_eq!(packages[0].ecosystem, Ecosystem::CratesIo);\n        assert_eq!(packages[1].name, \"regex\");\n    }\n\n    #[test]\n    fn test_parse_cargo_lock_v1() {\n        let dir = TempDir::new().unwrap();\n        let lock = dir.path().join(\"Cargo.lock\");\n        fs::write(\n            \u0026lock,\n            r#\"[[package]]\nname = \"my-crate\"\nversion = \"0.1.0\"\n\n[[package]]\nname = \"dep\"\nversion = \"2.0.0\"\nsource = \"registry+https://github.com/rust-lang/crates.io-index\"\n\"#,\n        )\n        .unwrap();\n\n        let packages = parse(\u0026lock).unwrap();\n        assert_eq!(packages.len(), 2);\n    }\n}\n","traces":[{"line":9,"address":[],"length":0,"stats":{"Line":3}},{"line":10,"address":[],"length":0,"stats":{"Line":12}},{"line":11,"address":[],"length":0,"stats":{"Line":15}},{"line":13,"address":[],"length":0,"stats":{"Line":6}},{"line":15,"address":[],"length":0,"stats":{"Line":9}},{"line":16,"address":[],"length":0,"stats":{"Line":6}},{"line":17,"address":[],"length":0,"stats":{"Line":3}},{"line":18,"address":[],"length":0,"stats":{"Line":8}},{"line":19,"address":[],"length":0,"stats":{"Line":25}},{"line":20,"address":[],"length":0,"stats":{"Line":25}},{"line":21,"address":[],"length":0,"stats":{"Line":5}},{"line":22,"address":[],"length":0,"stats":{"Line":10}},{"line":23,"address":[],"length":0,"stats":{"Line":5}},{"line":24,"address":[],"length":0,"stats":{"Line":5}},{"line":27,"address":[],"length":0,"stats":{"Line":3}},{"line":31,"address":[],"length":0,"stats":{"Line":3}}],"covered":16,"coverable":16},{"path":["/","Users","razvan","Development","depsec","src","parsers","gemfile_lock.rs"],"content":"use std::path::Path;\n\nuse anyhow::Context;\n\nuse super::{Ecosystem, Package};\n\n/// Parse Gemfile.lock.\n/// Gems are listed under the \"GEM\" section's \"specs:\" subsection.\n/// Format: \"    gem_name (version)\"\npub fn parse(path: \u0026Path) -\u003e anyhow::Result\u003cVec\u003cPackage\u003e\u003e {\n    let content = std::fs::read_to_string(path).context(\"Failed to read Gemfile.lock\")?;\n    let mut packages = Vec::new();\n    let mut in_gem_section = false;\n    let mut in_gem_specs = false;\n\n    for line in content.lines() {\n        // Track which top-level section we're in\n        if !line.starts_with(' ') \u0026\u0026 !line.is_empty() {\n            in_gem_section = line == \"GEM\";\n            in_gem_specs = false;\n            continue;\n        }\n\n        // Only look for specs: within the GEM section\n        if in_gem_section \u0026\u0026 line.trim() == \"specs:\" {\n            in_gem_specs = true;\n            continue;\n        }\n\n        // End of specs subsection (unindented within GEM section)\n        if in_gem_specs \u0026\u0026 !line.starts_with(\"  \") \u0026\u0026 !line.is_empty() {\n            in_gem_specs = false;\n            continue;\n        }\n\n        if !in_gem_specs {\n            continue;\n        }\n\n        // Gem entries are indented 4 spaces: \"    gem_name (version)\"\n        // Sub-dependencies are indented 6 spaces: \"      dep_name (constraint)\"\n        // We only want direct gems (4-space indent)\n        let trimmed = line.trim();\n        if line.starts_with(\"    \") \u0026\u0026 !line.starts_with(\"      \") {\n            if let Some((name, rest)) = trimmed.split_once(' ') {\n                let version = rest.trim_start_matches('(').trim_end_matches(')');\n                packages.push(Package {\n                    name: name.to_string(),\n                    version: version.to_string(),\n                    ecosystem: Ecosystem::RubyGems,\n                });\n            }\n        }\n    }\n\n    Ok(packages)\n}\n\n#[cfg(test)]\nmod tests {\n    use super::*;\n    use std::fs;\n    use tempfile::TempDir;\n\n    #[test]\n    fn test_parse_gemfile_lock() {\n        let dir = TempDir::new().unwrap();\n        let lock = dir.path().join(\"Gemfile.lock\");\n        fs::write(\n            \u0026lock,\n            r#\"GEM\n  remote: https://rubygems.org/\n  specs:\n    actioncable (7.1.3)\n      actionpack (= 7.1.3)\n    actionpack (7.1.3)\n      rack (~\u003e 3.0)\n    rack (3.0.8)\n\nPLATFORMS\n  ruby\n  x86_64-linux\n\nDEPENDENCIES\n  actioncable\n  rack\n\nBUNDLED WITH\n   2.5.0\n\"#,\n        )\n        .unwrap();\n\n        let packages = parse(\u0026lock).unwrap();\n        assert_eq!(packages.len(), 3);\n        assert!(packages\n            .iter()\n            .any(|p| p.name == \"actioncable\" \u0026\u0026 p.version == \"7.1.3\"));\n        assert!(packages\n            .iter()\n            .any(|p| p.name == \"actionpack\" \u0026\u0026 p.version == \"7.1.3\"));\n        assert!(packages\n            .iter()\n            .any(|p| p.name == \"rack\" \u0026\u0026 p.version == \"3.0.8\"));\n        assert!(packages.iter().all(|p| p.ecosystem == Ecosystem::RubyGems));\n    }\n}\n","traces":[{"line":10,"address":[],"length":0,"stats":{"Line":1}},{"line":11,"address":[],"length":0,"stats":{"Line":4}},{"line":12,"address":[],"length":0,"stats":{"Line":2}},{"line":13,"address":[],"length":0,"stats":{"Line":2}},{"line":14,"address":[],"length":0,"stats":{"Line":2}},{"line":16,"address":[],"length":0,"stats":{"Line":20}},{"line":18,"address":[],"length":0,"stats":{"Line":26}},{"line":19,"address":[],"length":0,"stats":{"Line":4}},{"line":20,"address":[],"length":0,"stats":{"Line":4}},{"line":21,"address":[],"length":0,"stats":{"Line":4}},{"line":25,"address":[],"length":0,"stats":{"Line":23}},{"line":26,"address":[],"length":0,"stats":{"Line":1}},{"line":27,"address":[],"length":0,"stats":{"Line":1}},{"line":31,"address":[],"length":0,"stats":{"Line":21}},{"line":32,"address":[],"length":0,"stats":{"Line":0}},{"line":33,"address":[],"length":0,"stats":{"Line":0}},{"line":36,"address":[],"length":0,"stats":{"Line":14}},{"line":37,"address":[],"length":0,"stats":{"Line":8}},{"line":43,"address":[],"length":0,"stats":{"Lin |e| e.ok())\n        .filter(|e| e.file_type().is_file())\n    {\n        let path = entry.path();\n        let filename = match path.file_name().and_then(|n| n.to_str()) {\n            Some(n) =\u003e n,\n            None =\u003e continue,\n        };\n\n        // Skip hidden directories and common non-project dirs\n        let rel = path.strip_prefix(root).unwrap_or(path);\n        if rel.components().any(|c| {\n            let s = c.as_os_str().to_str().unwrap_or(\"\");\n            s.starts_with('.') || s == \"node_modules\" || s == \"target\" || s == \"vendor\"\n        }) {\n            continue;\n        }\n\n        let rel_path = rel.to_string_lossy().to_string();\n\n        let packages = match filename {\n            \"Cargo.lock\" =\u003e cargo_lock::parse(path),\n            \"package-lock.json\" =\u003e package_lock::parse_npm(path),\n            \"yarn.lock\" =\u003e package_lock::parse_yarn(path),\n            \"pnpm-lock.yaml\" =\u003e package_lock::parse_pnpm(path),\n            \"Gemfile.lock\" =\u003e gemfile_lock::parse(path),\n            \"go.sum\" =\u003e go_sum::parse(path),\n            \"poetry.lock\" =\u003e pip::parse_poetry(path),\n            \"Pipfile.lock\" =\u003e pip::parse_pipfile(path),\n            \"requirements.txt\" =\u003e pip::parse_requirements(path),\n            _ =\u003e continue,\n        };\n\n        match packages {\n            Ok(pkgs) if !pkgs.is_empty() =\u003e {\n                results.push((rel_path, pkgs));\n            }\n            Ok(_) =\u003e {} // Empty, skip\n            Err(e) =\u003e {\n                eprintln!(\"Warning: failed to parse {rel_path}: {e}\");\n            }\n        }\n    }\n\n    results\n}\n\n/// Deduplicate packages by (name, version, ecosystem)\npub fn deduplicate(packages: Vec\u003cPackage\u003e) -\u003e Vec\u003cPackage\u003e {\n    let mut seen = std::collections::HashSet::new();\n    packages\n        .into_iter()\n        .filter(|p| seen.insert((p.name.clone(), p.version.clone(), p.ecosystem.clone())))\n        .collect()\n}\n","traces":[{"line":25,"address":[],"length":0,"stats":{"Line":0}},{"line":26,"address":[],"length":0,"stats":{"Line":0}},{"line":27,"address":[],"length":0,"stats":{"Line":0}},{"line":28,"address":[],"length":0,"stats":{"Line":0}},{"line":29,"address":[],"length":0,"stats":{"Line":0}},{"line":30,"address":[],"length":0,"stats":{"Line":0}},{"line":31,"address":[],"length":0,"stats":{"Line":0}},{"line":44,"address":[],"length":0,"stats":{"Line":7}},{"line":45,"address":[],"length":0,"stats":{"Line":14}},{"line":47,"address":[],"length":0,"stats":{"Line":15}},{"line":48,"address":[],"length":0,"stats":{"Line":14}},{"line":49,"address":[],"length":0,"stats":{"Line":7}},{"line":50,"address":[],"length":0,"stats":{"Line":23}},{"line":51,"address":[],"length":0,"stats":{"Line":23}},{"line":53,"address":[],"length":0,"stats":{"Line":3}},{"line":54,"address":[],"length":0,"stats":{"Line":6}},{"line":55,"address":[],"length":0,"stats":{"Line":2}},{"line":56,"address":[],"length":0,"stats":{"Line":0}},{"line":60,"address":[],"length":0,"stats":{"Line":6}},{"line":61,"address":[],"length":0,"stats":{"Line":3}},{"line":62,"address":[],"length":0,"stats":{"Line":5}},{"line":63,"address":[],"length":0,"stats":{"Line":5}},{"line":65,"address":[],"length":0,"stats":{"Line":0}},{"line":68,"address":[],"length":0,"stats":{"Line":3}},{"line":70,"address":[],"length":0,"stats":{"Line":2}},{"line":71,"address":[],"length":0,"stats":{"Line":3}},{"line":72,"address":[],"length":0,"stats":{"Line":0}},{"line":73,"address":[],"length":0,"stats":{"Line":0}},{"line":74,"address":[],"length":0,"stats":{"Line":0}},{"line":75,"address":[],"length":0,"stats":{"Line":0}},{"line":76,"address":[],"length":0,"stats":{"Line":0}},{"line":77,"address":[],"length":0,"stats":{"Line":0}},{"line":78,"address":[],"length":0,"stats":{"Line":0}},{"line":79,"address":[],"length":0,"stats":{"Line":0}},{"line":80,"address":[],"length":0,"stats":{"Line":0}},{    name: name.to_string(),\n                    version: version.to_string(),\n                    ecosystem: Ecosystem::Npm,\n                });\n            }\n        }\n    }\n    // v1: \"dependencies\" object\n    else if let Some(deps) = parsed.get(\"dependencies\").and_then(|d| d.as_object()) {\n        collect_v1_deps(deps, \u0026mut packages);\n    }\n\n    Ok(packages)\n}\n\nfn collect_v1_deps(deps: \u0026serde_json::Map\u003cString, serde_json::Value\u003e, packages: \u0026mut Vec\u003cPackage\u003e) {\n    for (name, value) in deps {\n        if let Some(version) = value.get(\"version\").and_then(|v| v.as_str()) {\n            packages.push(Package {\n                name: name.clone(),\n                version: version.to_string(),\n                ecosystem: Ecosystem::Npm,\n            });\n        }\n\n        // v1 can have nested dependencies\n        if let Some(nested) = value.get(\"dependencies\").and_then(|d| d.as_object()) {\n            collect_v1_deps(nested, packages);\n        }\n    }\n}\n\n/// Parse yarn.lock v1 (classic yarn).\n/// Format: quoted package name with version constraint, then indented \"version\" field.\npub fn parse_yarn(path: \u0026Path) -\u003e anyhow::Result\u003cVec\u003cPackage\u003e\u003e {\n    let content = std::fs::read_to_string(path).context(\"Failed to read yarn.lock\")?;\n    let mut packages = Vec::new();\n    let mut current_name: Option\u003cString\u003e = None;\n\n    for line in content.lines() {\n        let trimmed = line.trim();\n\n        // Skip comments and empty lines\n        if trimmed.starts_with('#') || trimmed.is_empty() {\n            continue;\n        }\n\n        // Package header: \"name@version:\" or \"name@version, name@version:\"\n        if !line.starts_with(' ') \u0026\u0026 !line.starts_with('\\t') \u0026\u0026 trimmed.ends_with(':') {\n            // Extract the package name (before the @version part)\n            let entry = trimmed.trim_end_matches(':').trim_matches('\"');\n            if let Some(at_pos) = entry.rfind('@') {\n                if at_pos \u003e 0 {\n                    let name = \u0026entry[..at_pos];\n                    current_name = Some(name.to_string());\n                }\n            }\n        }\n\n        // Version line within a package block\n        if trimmed.starts_with(\"version \") \u0026\u0026 current_name.is_some() {\n            let version = trimmed.trim_start_matches(\"version \").trim_matches('\"');\n            if let Some(name) = current_name.take() {\n                packages.push(Package {\n                    name,\n                    version: version.to_string(),\n                    ecosystem: Ecosystem::Npm,\n                });\n            }\n        }\n    }\n\n    Ok(packages)\n}\n\n/// Parse pnpm-lock.yaml.\n/// Packages are under `packages` key with paths like \"/pkg@version\".\n/// Uses line-based parsing to avoid YAML library dependency.\npub fn parse_pnpm(path: \u0026Path) -\u003e anyhow::Result\u003cVec\u003cPackage\u003e\u003e {\n    let content = std::fs::read_to_string(path).context(\"Failed to read pnpm-lock.yaml\")?;\n    let mut packages = Vec::new();\n    let mut in_packages = false;\n\n    for line in content.lines() {\n        // Detect the top-level `packages:` section\n        if line == \"packages:\" {\n            in_packages = true;\n            continue;\n        }\n\n        // End of packages section (next top-level key)\n        if in_packages \u0026\u0026 !line.starts_with(' ') \u0026\u0026 !line.starts_with('\\t') \u0026\u0026 !line.is_empty() {\n            break;\n        }\n\n        if !in_packages {\n            continue;\n        }\n\n        // Package entries are indented and end with ':'\n        // e.g., \"  /lodash@4.17.21:\" or \"  /@types/node@18.0.0:\" or \"  lodash@4.17.21:\"\n        let trimmed = line.trim();\n        if !trimmed.ends_with(':') || trimmed.starts_with('#') {\n            continue;\n        }\n        // Skip sub-keys (deeper inde       })\n                })\n                .collect()\n        })\n        .unwrap_or_default();\n\n    Ok(packages)\n}\n\n/// Parse Pipfile.lock (JSON format).\n/// Packages are under \"default\" and \"develop\" keys.\npub fn parse_pipfile(path: \u0026Path) -\u003e anyhow::Result\u003cVec\u003cPackage\u003e\u003e {\n    let content = std::fs::read_to_string(path).context(\"Failed to read Pipfile.lock\")?;\n    let parsed: serde_json::Value =\n        serde_json::from_str(\u0026content).context(\"Failed to parse Pipfile.lock\")?;\n\n    let mut packages = Vec::new();\n\n    for section in [\"default\", \"develop\"] {\n        if let Some(deps) = parsed.get(section).and_then(|d| d.as_object()) {\n            for (name, value) in deps {\n                if let Some(version) = value.get(\"version\").and_then(|v| v.as_str()) {\n                    // Version format: \"==1.2.3\"\n                    let clean = version.trim_start_matches(\"==\");\n                    packages.push(Package {\n                        name: name.clone(),\n                        version: clean.to_string(),\n                        ecosystem: Ecosystem::PyPI,\n                    });\n                }\n            }\n        }\n    }\n\n    Ok(packages)\n}\n\n/// Parse requirements.txt.\n/// Only includes entries with exact pins (==).\n/// Warns about unpinned entries.\npub fn parse_requirements(path: \u0026Path) -\u003e anyhow::Result\u003cVec\u003cPackage\u003e\u003e {\n    let content = std::fs::read_to_string(path).context(\"Failed to read requirements.txt\")?;\n    let mut packages = Vec::new();\n    let mut unpinned_count = 0;\n\n    for line in content.lines() {\n        let trimmed = line.trim();\n\n        // Skip comments and empty lines\n        if trimmed.is_empty() || trimmed.starts_with('#') || trimmed.starts_with('-') {\n            continue;\n        }\n\n        // Look for exact pins (name==version)\n        if let Some((name, version)) = trimmed.split_once(\"==\") {\n            let name = name.trim();\n            let version = version.split(';').next().unwrap_or(version).trim(); // Strip markers\n            if !name.is_empty() \u0026\u0026 !version.is_empty() {\n                packages.push(Package {\n                    name: name.to_string(),\n                    version: version.to_string(),\n                    ecosystem: Ecosystem::PyPI,\n                });\n            }\n        } else if trimmed.contains(\"\u003e=\") || trimmed.contains(\"\u003c=\") || trimmed.contains(\"~=\") {\n            unpinned_count += 1;\n        } else if !trimmed.contains(\"==\") \u0026\u0026 !trimmed.starts_with('-') {\n            // Bare package name without version\n            unpinned_count += 1;\n        }\n    }\n\n    if unpinned_count \u003e 0 {\n        eprintln!(\n            \"Warning: {unpinned_count} unpinned entries in requirements.txt skipped (only == pins are checked)\"\n        );\n    }\n\n    Ok(packages)\n}\n\n#[cfg(test)]\nmod tests {\n    use super::*;\n    use std::fs;\n    use tempfile::TempDir;\n\n    #[test]\n    fn test_parse_poetry_lock() {\n        let dir = TempDir::new().unwrap();\n        let lock = dir.path().join(\"poetry.lock\");\n        fs::write(\n            \u0026lock,\n            r#\"[[package]]\nname = \"requests\"\nversion = \"2.31.0\"\n\n[[package]]\nname = \"flask\"\nversion = \"3.0.0\"\n\"#,\n        )\n        .unwrap();\n\n        let packages = parse_poetry(\u0026lock).unwrap();\n        assert_eq!(packages.len(), 2);\n        assert!(packages\n            .iter()\n            .any(|p| p.name == \"requests\" \u0026\u0026 p.version == \"2.31.0\"));\n    }\n\n    #[test]\n    fn test_parse_pipfile_lock() {\n        let dir = TempDir::new().unwrap();\n        let lock = dir.path().join(\"Pipfile.lock\");\n        fs::write(\n            \u0026lock,\n            r#\"{\n    \"_meta\": { \"hash\": {\"sha256\": \"abc\"} },\n    \"default\": {\n        \"requests\": { \"version\": \"==2.31.0\" },\n        \"flask\": { \"version\": \"==3.0.0\" }\n    },\n    \"develop\": {\n        \"pytest\": { \"version\": \"==7.4.0\" }\n    }\n}\"#,\n        )\n        .unwrap();\n\n        let packages = parse_pipfile(\u0026lock).unwrap();\n        assert_eq!(packages.len(), 3);\n        assert!(packages\n            .iter()\n            .any(|p| p.name == \"requests\" \u0026\u0026 p.version == \"2.31.0\"));\n        assert!(packages\n            .iter()\n            .any(|p| p.name == \"pytest\" \u0026\u0026 p.version == \"7.4.0\"));\n    }\n\n    #[test]\n    fn test_parse_requirements_pinned() {\n        let dir = TempDir::new().unwrap();\n        let req = dir.path().join(\"requirements.txt\");\n        fs::write(\n            \u0026req,\n            r#\"# dependencies\nrequests==2.31.0\nflask==3.0.0 ; python_version \u003e= \"3.8\"\nnumpy\u003e=1.24.0\npandas\n\"#,\n        )\n        .unwrap();\n\n        let packages = parse_requirements(\u0026req).unwrap();\n        assert_eq!(packages.len(), 2); // Only pinned entries\n        assert!(packages\n            .iter()\n            .any(|p| p.name == \"requests\" \u0026\u0026 p.version == \"2.31.0\"));\n        assert!(packages\n            .iter()\n            .any(|p| p.name == \"flask\" \u0026\u0026 p.version == \"3.0.0\"));\n    }\n}\n","traces":[{"line":9,"address":[],"length":0,"stats":{"Line":1}},{"line":10,"address":[],"length":0,"stats":{"Line":4}},{"line":11,"address":[],"length":0,"stats":{"Line":5}},{"line":13,"address":[],"length":0,"stats":{"Line":2}},{"line":15,"address":[],"length":0,"stats":{"Line":3}},{"line":16,"address":[],"length":0,"stats":{"Line":2}},{"line":17,"address":[],"length":0,"stats":{"Line":1}},{"line":18,"address":[],"length":0,"stats":{"Line":3}},{"line":19,"address":[],"length":0,"stats":{"Line":10}},{"line":20,"address":[],"length":0,"stats":{"Line":10}},{"line":21,"address":[],"length":0,"stats":{"Line":2}},{"line":22,"address":[],"length":0,"stats":{"Line":4}},{"line":23,"address  \"langchain\",\n    \"litellm\",\n    \"cohere\",\n    \"telnyx\",\n    \"twilio\",\n    \"stripe\",\n    \"sendgrid\",\n];\n\n/// Top crates.io packages\nconst CRATES_TOP_PACKAGES: \u0026[\u0026str] = \u0026[\n    \"serde\",\n    \"serde_json\",\n    \"tokio\",\n    \"clap\",\n    \"rand\",\n    \"regex\",\n    \"log\",\n    \"anyhow\",\n    \"thiserror\",\n    \"reqwest\",\n    \"hyper\",\n    \"axum\",\n    \"actix-web\",\n    \"warp\",\n    \"rocket\",\n    \"sqlx\",\n    \"diesel\",\n    \"sea-orm\",\n    \"rusqlite\",\n    \"redis\",\n    \"tracing\",\n    \"env_logger\",\n    \"pretty_env_logger\",\n    \"chrono\",\n    \"uuid\",\n    \"url\",\n    \"base64\",\n    \"sha2\",\n    \"ring\",\n    \"rayon\",\n    \"crossbeam\",\n    \"dashmap\",\n    \"parking_lot\",\n    \"syn\",\n    \"quote\",\n    \"proc-macro2\",\n    \"darling\",\n    \"toml\",\n    \"config\",\n    \"dotenv\",\n    \"envy\",\n    \"itertools\",\n    \"once_cell\",\n    \"lazy_static\",\n    \"paste\",\n    \"bytes\",\n    \"memmap2\",\n    \"walkdir\",\n    \"glob\",\n    \"tempfile\",\n];\n\npub struct PreflightResult {\n    pub findings: Vec\u003cFinding\u003e,\n    pub packages_checked: usize,\n}\n\npub fn run_preflight(root: \u0026Path, json_output: bool) -\u003e anyhow::Result\u003cPreflightResult\u003e {\n    let mut findings = Vec::new();\n\n    // 1. Check package.json install scripts\n    check_package_json_scripts(root, \u0026mut findings);\n\n    // 2. Parse lockfiles and check for typosquatting\n    let lockfile_results = parsers::parse_all_lockfiles(root, 3);\n    let mut all_packages: Vec\u003cparsers::Package\u003e = Vec::new();\n\n    for (_name, pkgs) in \u0026lockfile_results {\n        all_packages.extend(pkgs.iter().cloned());\n    }\n    let packages = parsers::deduplicate(all_packages);\n    let package_count = packages.len();\n\n    // Check typosquatting\n    for pkg in \u0026packages {\n        check_typosquatting(pkg, \u0026mut findings);\n    }\n\n    // 3. Check lockfile hash integrity\n    check_lockfile_hashes(root, \u0026mut findings);\n\n    // 4. Query deps.dev for metadata (if packages are few enough)\n    if package_count \u003c= 50 {\n        check_package_metadata(\u0026packages, \u0026mut findings);\n    }\n\n    let result = PreflightResult {\n        findings: findings.clone(),\n        packages_checked: package_count,\n    };\n\n    if json_output {\n        let output = serde_json::json!({\n            \"packages_checked\": package_count,\n            \"findings\": findings,\n        });\n        println!(\"{}\", serde_json::to_string_pretty(\u0026output)?);\n    } else {\n        print_preflight_result(\u0026result);\n    }\n\n    Ok(result)\n}\n\nfn check_package_json_scripts(root: \u0026Path, findings: \u0026mut Vec\u003cFinding\u003e) {\n    let package_json = root.join(\"package.json\");\n    if !package_json.exists() {\n        return;\n    }\n\n    let content = match std::fs::read_to_string(\u0026package_json) {\n        Ok(c) =\u003e c,\n        Err(_) =\u003e return,\n    };\n\n    let parsed: serde_json::Value = match serde_json::from_str(\u0026content) {\n        Ok(v) =\u003e v,\n        Err(_) =\u003e return,\n    };\n\n    let scripts = match parsed.get(\"scripts\").and_then(|s| s.as_object()) {\n        Some(s) =\u003e s,\n        None =\u003e return,\n    };\n\n    let hooks = [\"preinstall\", \"postinstall\", \"install\"];\n    for hook in \u0026hooks {\n        if let Some(script) = scripts.get(*hook).and_then(|s| s.as_str()) {\n            findings.push(Finding {\n                rule_id: \"DEPSEC-PF001\".into(),\n                severity: Severity::Medium,\n                message: format!(\"Install script '{hook}': {script}\"),\n                file: Some(\"package.json\".into()),\n                line: None,\n                suggestion: Some(format!(\n                    \"Review the '{hook}' script — install hooks run automatically during npm install\"\n                )),\n                confidence: None, package: None, reachable: None,\n                auto_fixable: false,\n            });\n        }\n    }\n}\n\nfn check_typosquatting(pkg: \u0026parsers::Package, findings: \u0026mut Vec\u003cFinding\u003e) {\n    let popular = match pkg.ecosystem {\n        parsers::Ecosystem::Npm =\u003e NPM_TOP_PACKAGES,\n        parsers::Ecosystem::PyPI =\u003e PYPI_TOP_PACKAGES,\n        parsers::Ecosystem::CratesIo =\u003e CRATES_TOP_PACKAGES,\n        _ =\u003e return,\n    };\n\n    // Skip if the package IS in the top list\n    if popular.contains(\u0026pkg.name.as_str()) {\n        return;\n    }\n\n    for \u0026top_pkg in popular {\n        let distance = levenshtein(\u0026pkg.name, top_pkg);\n        if distance \u003e 0 \u0026\u0026 distance \u003c= 2 {\n            findings.push(Finding {\n                rule_id: \"DEPSEC-T001\".into(),\n                severity: Severity::High,\n                message: format!(\n                    \"Possible typosquat: '{}' is similar to popular package '{top_pkg}' (distance: {distance})\",\n                    pkg.name\n                ),\n                file: None,\n                line: None,\n                suggestion: Some(format!(\n                    \"Verify you intended to install '{}' and not '{top_pkg}'\",\n                    pkg.name\n                )),\n                confidence: None, package: None, reachable: None,\n                auto_fixable: false,\n            });\n            break; // One match per package is enough\n        }\n    }\n}\n\n/// Levenshtein distance — pure Rust, no dependencies\nfn levenshtein(a: \u0026str, b: \u0026str) -\u003e usize {\n    let a_len = a.len();\n    let b_len = b.len();\n\n    if a_len == 0 {\n        return b_len;\n    }\n    if b_len == 0 {\n        return a_len;\n    }\n\n    let mut prev_row: Vec\u003cusize\u003e = (0..=b_len).collect();\n    let mut curr_row = vec![0; b_len + 1];\n\n    for (i, a_char) in a.chars().enumerate() {\n        curr_row[0] = i + 1;\n        for (j, b_char) in b.chars().enumerate() {\n            let cost = if a_char == b_char { 0 } else { 1 };\n            curr_row[j + 1] = (prev_row[j + 1] + 1)\n                .min(curr_row[j] + 1)\n                .min(prev_row[j] + cost);\n        }\n        std::mem::swap(\u0026mut prev_row, \u0026mut curr_row);\n    }\n\n    prev_row[b_len]\n}\n\nfn check_lockfile_hashes(root: \u0026Path, findings: \u0026mut Vec\u003cFinding\u003e) {\n    // Check package-lock.json for integrity hashes\n    let npm_lock = root.join(\"package-lock.json\");\n    if npm_lock.exists() {\n        if let Ok(content) = std::fs::read_to_string(\u0026npm_lock) {\n            if let Ok(parsed) = serde_json::from_str::\u003cserde_json::Value\u003e(\u0026content) {\n                if let Some(pkgs) = parsed.get(\"packages\").and_then(|p| p.as_object()) {\n                    let missing_hash = pkgs\n                        .values()\n                        .filter(|v| {\n                            !v.get(\"link\").and_then(|l| l.as_bool()).unwrap_or(false)\n                                \u0026\u0026 v.get(\"integrity\").is_none()\n                                \u0026\u0026 v.get(\"version\").is_some()\n                        })\n                        .count();\n\n                    if missing_hash \u003e 0 {\n                        findings.push(Finding {\n                            rule_id: \"DEPSEC-T007\".into(),\n                            severity: Severity::Medium,\n                            message: format!(\n                                \"{missing_hash} packages in package-lock.json missing integrity hashes\"\n                            ),\n                            file: Some(\"package-lock.json\".into()),\n                            line: None,\n                            suggestion: Some(\"Regenerate lockfile with 'npm install' to add integrity hashes\".into()),\n                            confidence: None, package: None, reachable: None,\n                auto_fixable: false,\n                        });\n                    }\n                }\n            }\n        }\n    }\n}\n\nfn check_package_metadata(packages: \u0026[parsers::Package], findings: \u0026mut Vec\u003cFinding\u003e) {\n    let agent = ureq::AgentBuilder::new()\n        .timeout_read(std::time::Duration::from_secs(10))\n        .user_agent(\"depsec\")\n        .build();\n\n    for pkg in packages.iter().take(20) {\n        // Rate limit: only check first 20\n        let ecosystem = match pkg.ecosystem {\n            parsers::Ecosystem::Npm =\u003e \"npm\",\n            parsers::Ecosystem::PyPI =\u003e \"pypi\",\n            parsers::Ecosystem::CratesIo =\u003e \"cargo\",\n            parsers::Ecosystem::Go =\u003e \"go\",\n            parsers::Ecosystem::RubyGems =\u003e continue, // deps.dev doesn't support well\n        };\n\n        let url = format!(\n            \"https://api.deps.dev/v3alpha/systems/{}/packages/{}/versions/{}\",\n            ecosystem,\n            urlencoded(\u0026pkg.name),\n            urlencoded(\u0026pkg.version)\n        );\n\n        let resp = match agent.get(\u0026url).call() {\n            Ok(r) =\u003e r,\n            Err(_) =\u003e continue, // Skip on network error\n        };\n\n        let body: serde_json::Value = match resp.into_json() {\n            Ok(v) =\u003e v,\n            Err(_) =\u003e continue,\n        };\n\n        // Check publish date — flag packages published very recently\n        if let Some(published) = body.get(\"publishedAt\").and_then(|p| p.as_str()) {\n            if is_recently_published(published, 7) {\n                findings.push(Finding {\n                    rule_id: \"DEPSEC-T002\".into(),\n                    severity: Severity::Medium,\n                    message: format!(\n                        \"Package {} {} was published recently ({})\",\n                        pkg.name,\n                        pkg.version,\n                        \u0026published[..10_usize.min(published.len())]\n                    ),\n                    file: None,\n                    line: None,\n                    suggestion: Some(\n                        \"Newly published packages near popular names may be typosquats\".into(),\n                    ),\n                    confidence: None,\n                    package: None,\n                    reachable: None,\n                    auto_fixable: false,\n                });\n            }\n        }\n\n        // Check for missing source repo\n        let has_source = body\n            .get(\"links\")\n            .and_then(|l| l.as_array())\n            .map(|links| {\n                links\n                    .iter()\n                    .any(|l| l[\"label\"].as_str() == Some(\"SOURCE_REPO\"))\n            })\n            .unwrap_or(false);\n\n        if !has_source {\n            findings.push(Finding {\n                rule_id: \"DEPSEC-T004\".into(),\n                severity: Severity::Low,\n                message: format!(\n                    \"Package {} {} has no linked source repository\",\n                    pkg.name, pkg.version\n                ),\n                file: None,\n                line: None,\n                suggestion: Some(\"Packages without source repos are harder to audit\".into()),\n                confidence: None,\n                package: None,\n                reachable: None,\n                auto_fixable: false,\n            });\n        }\n    }\n}\n\n/// Simple URL encoding for package names (handles @ and /)\nfn urlencoded(s: \u0026str) -\u003e String {\n    s.replace('@', \"%40\").replace('/', \"%2F\")\n}\n\n/// Check if an ISO 8601 date string is within `days` of today.\n/// Simple implementation without chrono dependency.\nfn is_recently_published(date_str: \u0026str, days: u64) -\u003e bool {\n    // Parse \"2026-03-27T...\" — extract YYYY-MM-DD\n    if date_str.len() \u003c 10 {\n        return false;\n    }\n    let date_part = \u0026date_str[..10];\n    let parts: Vec\u003c\u0026str\u003e = date_part.split('-').collect();\n    if parts.len() != 3 {\n        return false;\n    }\n\n    let year: i64 = parts[0].parse().unwrap_or(0);\n    let month: i64 = parts[1].parse().unwrap_or(0);\n    let day: i64 = parts[2].parse().unwrap_or(0);\n\n    // Get today's date\n    let today = std::process::Command::new(\"date\")\n        .arg(\"+%Y-%m-%d\")\n        .output()\n        .ok()\n        .and_then(|o| String::from_utf8(o.stdout).ok())\n        .unwrap_or_default();\n    let today = today.trim();\n\n    let today_parts: Vec\u003c\u0026str\u003e = today.split('-').collect();\n    if today_parts.len() != 3 {\n        return false;\n    }\n\n    let ty: i64 = today_parts[0].parse().unwrap_or(0);\n    let tm: i64 = today_parts[1].parse().unwrap_or(0);\n    let td: i64 = today_parts[2].parse().unwrap_or(0);\n\n    // Approximate days difference (not perfect but good enough)\n    let pub_days = year * 365 + month * 30 + day;\n    let today_days = ty * 365 + tm * 30 + td;\n    let diff = today_days - pub_days;\n\n    diff \u003e= 0 \u0026\u0026 diff \u003c= days as i64\n}\n\nfn print_preflight_result(result: \u0026PreflightResult) {\n    println!(\n        \"\\ndepsec preflight — {} packages analyzed\\n\",\n        result.packages_checked\n    );\n\n    if result.findings.is_empty() {\n        println!(\"\\x1b[32m✓\\x1b[0m All clear — no pre-install concerns found.\");\n        return;\n    }\n\n    let critical = result\n        .findings\n        .iter()\n        .filter(|f| matches!(f.severity, Severity::Critical | Severity::High))\n        .count();\n    let warnings = result.findings.len() - critical;\n\n    for finding in \u0026result.findings {\n        let icon = match finding.severity {\n            Severity::Critical | Severity::High =\u003e \"\\x1b[31m✗\\x1b[0m\",\n            _ =\u003e \"\\x1b[33m⚠\\x1b[0m\",\n        };\n        println!(\"  {icon} [{}] {}\", finding.rule_id, finding.message);\n        if let Some(ref suggestion) = finding.suggestion {\n            println!(\"    → {suggestion}\");\n        }\n    }\n\n    println!();\n    if critical \u003e 0 {\n        println!(\n            \"\\x1b[31m{critical} high-risk finding{}\\x1b[0m, {warnings} warning{}.\",\n            if critical == 1 { \"\" } else { \"s\" },\n            if warnings == 1 { \"\" } else { \"s\" }\n        );\n    } else {\n        println!(\n            \"{warnings} warning{} found.\",\n            if warnings == 1 { \"\" } else { \"s\" }\n        );\n    }\n}\n\n#[cfg(test)]\nmod tests {\n    use super::*;\n\n    #[test]\n    fn test_levenshtein_identical() {\n        assert_eq!(levenshtein(\"lodash\", \"lodash\"), 0);\n    }\n\n    #[test]\n    fn test_levenshtein_one_char() {\n        assert_eq!(levenshtein(\"lodash\", \"lodas\"), 1); // deletion\n        assert_eq!(levenshtein(\"lodash\", \"lodahs\"), 2); // transposition = 2 ops in Levenshtein\n        assert_eq!(levenshtein(\"lodash\", \"lodashh\"), 1); // insertion\n    }\n\n    #[test]\n    fn test_levenshtein_typosquat() {\n        assert!(levenshtein(\"loadsh\", \"lodash\") \u003c= 2);\n        assert!(levenshtein(\"requets\", \"requests\") \u003c= 2);\n        assert!(levenshtein(\"colorsama\", \"colorama\") \u003c= 2);\n    }\n\n    #[test]\n    fn test_levenshtein_different() {\n        assert!(levenshtein(\"react\", \"express\") \u003e 2);\n    }\n\n    #[test]\n    fn test_levenshtein_empty() {\n        assert_eq!(levenshtein(\"\", \"hello\"), 5);\n        assert_eq!(levenshtein(\"hello\", \"\"), 5);\n        assert_eq!(levenshtein(\"\", \"\"), 0);\n    }\n\n    #[test]\n    fn test_typosquatting_detection() {\n        let mut findings = Vec::new();\n        let pkg = parsers::Package {\n            name: \"loadsh\".into(), // typosquat of \"lodash\"\n            version: \"1.0.0\".into(),\n            ecosystem: parsers::Ecosystem::Npm,\n        };\n        check_typosquatting(\u0026pkg, \u0026mut findings);\n        assert!(!findings.is_empty());\n        assert_eq!(findings[0].rule_id, \"DEPSEC-T001\");\n    }\n\n    #[test]\n    fn test_legitimate_package_not_flagged() {\n        let mut findings = Vec::new();\n        let pkg = parsers::Package {\n            name: \"lodash\".into(),\n            version: \"4.17.21\".into(),\n            ecosystem: parsers::Ecosystem::Npm,\n        };\n        check_typosquatting(\u0026pkg, \u0026mut findings);\n        assert!(findings.is_empty());\n    }\n\n    #[test]\n    fn test_url_encoding() {\n        assert_eq!(urlencoded(\"@types/node\"), \"%40types%2Fnode\");\n        assert_eq!(urlencoded(\"express\"), \"express\");\n    }\n}\n","traces":[{"line":258,"address":[],"length":0,"stats":{"Line":0}},{"line":259,"address":[],"length":0,"stats":{"Line":0}},{"line":262,"address":[],"length":0,"stats":{"Line":0}},{"line":265,"address":[],"length":0,"stats":{"Line":0}},{"line":266,"address":[],"length":0,"stats":{"Line":0}},{"line":268,"address":[],"length":0,"stats":{"Line":0}},{"line":269,"address":[],"length":0,"stats":{"Line":0}},{"line":271,"address":[],"length":0,"stats":{"Line":0}},{"line":272,"address":[],"length":0,"stats":{"Line":0}},{"line":275,"address":[],"length":0,"stats":{"Line":0}},{"line":276,"address":[],"length":0,"stats":{"Line":0}},{"line":280,"address":[],"length":0,"stats":{"Line":0}},{"line":283,"address":[],"length":0,"stats":{"Line":0}},{"line":284,"address":[],"length":0,"stats":{"Line":0}},{"line":288,"address":[],"length":0,"stats":{"Line":0}},{"line":292,"address":[],"length":0,"stats":{"Line":0}},{"line":293,"address":[],"length":0,"stats":{"Line":0}},{"line":294,"address":[],"length":0,"stats":{"Line":0}},{"line":295,"address":[],"length":0,"stats":{"Line":0}},{"line":297,"address":[],"length":0,"stats":{"Line":0}},{"line":299,"address":[],"length":0,"stats":{"Line":0}},{"line":302,"address":[],"length":0,"stats":{"Line":0}},{"line":305,"address":[],"length":0,"stats":{"Line":0}},{"line":306,"ad  \"tsx\" {\n                    \u0026mut ts_parser\n                } else {\n                    \u0026mut js_parser\n                };\n\n                extract_imports_ts(parser, \u0026content, \u0026rel_path, \u0026mut packages, \u0026mut locations);\n            } else if ext == \"svelte\" || ext == \"vue\" {\n                // Extract \u003cscript\u003e block and parse as JS/TS\n                if let Some(script_content) = extract_script_block(\u0026content) {\n                    let script_has_ts =\n                        content.contains(\"lang=\\\"ts\\\"\") || content.contains(\"lang='ts'\");\n                    let parser = if script_has_ts {\n                        \u0026mut ts_parser\n                    } else {\n                        \u0026mut js_parser\n                    };\n                    extract_imports_ts(\n                        parser,\n                        \u0026script_content,\n                        \u0026rel_path,\n                        \u0026mut packages,\n                        \u0026mut locations,\n                    );\n                }\n            }\n        }\n    }\n\n    // Also scan root-level config files (svelte.config.js, vite.config.ts, etc.)\n    for config_file in \u0026[\n        \"svelte.config.js\",\n        \"vite.config.ts\",\n        \"vite.config.js\",\n        \"next.config.js\",\n        \"next.config.ts\",\n        \"tailwind.config.js\",\n        \"tailwind.config.ts\",\n        \"vitest.config.ts\",\n    ] {\n        let path = root.join(config_file);\n        if let Ok(content) = std::fs::read_to_string(\u0026path) {\n            let is_ts = config_file.ends_with(\".ts\");\n            let parser = if is_ts {\n                \u0026mut ts_parser\n            } else {\n                \u0026mut js_parser\n            };\n            // Config file imports are build-time, but we include them for completeness\n            extract_imports_ts(parser, \u0026content, config_file, \u0026mut packages, \u0026mut locations);\n        }\n    }\n\n    AppImports {\n        packages,\n        locations,\n    }\n}\n\n/// Extract package imports from JS/TS using tree-sitter\nfn extract_imports_ts(\n    parser: \u0026mut Parser,\n    content: \u0026str,\n    file_path: \u0026str,\n    packages: \u0026mut HashSet\u003cString\u003e,\n    locations: \u0026mut HashMap\u003cString, Vec\u003c(String, usize)\u003e\u003e,\n) {\n    let tree = match parser.parse(content, None) {\n        Some(t) =\u003e t,\n        None =\u003e return,\n    };\n\n    let source = content.as_bytes();\n\n    // Query for ES imports: import X from 'package'\n    let import_query = Query::new(\n        \u0026tree.language(),\n        r#\"\n        (import_statement\n          source: (string (string_fragment) @module))\n        \"#,\n    );\n\n    if let Ok(query) = import_query {\n        let module_idx = query\n            .capture_names()\n            .iter()\n            .position(|n| *n == \"module\")\n            .unwrap();\n\n        let mut cursor = QueryCursor::new();\n        let mut matches = cursor.matches(\u0026query, tree.root_node(), source);\n\n        while let Some(m) = matches.next() {\n            if let Some(cap) = m.captures.iter().find(|c| c.index as usize == module_idx) {\n                let module = cap.node.utf8_text(source).unwrap_or(\"\");\n                if let Some(pkg) = extract_package_from_module(module) {\n                    let line = cap.node.start_position().row + 1;\n                    packages.insert(pkg.clone());\n                    locations\n                        .entry(pkg)\n                        .or_default()\n                        .push((file_path.to_string(), line));\n                }\n            }\n        }\n    }\n\n    // Query for CommonJS requires: const X = require('package')\n    let require_query = Query::new(\n        \u0026tree.language(),\n        r#\"\n        (call_expression\n          function: (identifier) @fn\n          arguments: (arguments (string (string_fragment) @module))\n          (#eq? @fn \"require\"))\n        \"#,\n    );\n\n    if let Ok(query) = require_query {\n        let module_idx = query\n            .capture_names()\n            .iter()\n            .position(|n| *n == \"module\")\n            .unwrap();\n\n        let mut cursor = QueryCursor::new();\n        let mut matches = cursor.matches(\u0026query, tree.root_node(), source);\n\n        while let Some(m) = matches.next() {\n            if let Some(cap) = m.captures.iter().find(|c| c.index as usize == module_idx) {\n                let module = cap.node.utf8_text(source).unwrap_or(\"\");\n                if let Some(pkg) = extract_package_from_module(module) {\n                    let line = cap.node.start_position().row + 1;\n                    packages.insert(pkg.clone());\n                    locations\n                        .entry(pkg)\n                        .or_default()\n                        .push((file_path.to_string(), line));\n                }\n            }\n        }\n    }\n\n    // Query for dynamic imports: import('package')\n    let dynamic_query = Query::new(\n        \u0026tree.language(),\n        r#\"\n        (call_expression\n          function: (import)\n          arguments: (arguments (string (string_fragment) @module)))\n        \"#,\n    );\n\n    if let Ok(query) = dynamic_query {\n        let module_idx = query\n            .capture_names()\n            .iter()\n            .position(|n| *n == \"module\")\n            .unwrap();\n\n        let mut cursor = QueryCursor::new();\n        let mut matches = cursor.matches(\u0026query, tree.root_node(), source);\n\n        while let Some(m) = matches.next() {\n            if let Some(cap) = m.captures.iter().find(|c| c.index as usize == module_idx) {\n                let module = cap.node.utf8_text(source).unwrap_or(\"\");\n                if let Some(pkg) = extract_package_from_module(module) {\n                    let line = cap.node.start_position().row + 1;\n                    packages.insert(pkg.clone());\n                    locations\n                        .entry(pkg)\n                        .or_default()\n                        .push((file_path.to_string(), line));\n                }\n            }\n        }\n    }\n}\n\n/// Convert a module specifier to a package name.\n/// \"lodash\" → \"lodash\"\n/// \"@scope/pkg\" → \"@scope/pkg\"\n/// \"@scope/pkg/sub/path\" → \"@scope/pkg\"\n/// \"./relative\" → None (local import)\n/// \"fs\" → \"fs\" (builtin, but we include it)\nfn extract_package_from_module(module: \u0026str) -\u003e Option\u003cString\u003e {\n    if module.starts_with('.') || module.starts_with('/') {\n        return None; // Relative or absolute path\n    }\n    if module.starts_with('$') {\n        return None; // SvelteKit alias ($lib, $app, etc.)\n    }\n\n    let parts: Vec\u003c\u0026str\u003e = module.split('/').collect();\n    if parts[0].starts_with('@') \u0026\u0026 parts.len() \u003e= 2 {\n        Some(format!(\"{}/{}\", parts[0], parts[1]))\n    } else {\n        Some(parts[0].to_string())\n    }\n}\n\n/// Extract the content of \u003cscript\u003e tags from Svelte/Vue files\nfn extract_script_block(content: \u0026str) -\u003e Option\u003cString\u003e {\n    let mut scripts = String::new();\n\n    let mut remaining = content;\n    while let Some(start) = remaining.find(\"\u003cscript\") {\n        let after_tag = \u0026remaining[start..];\n        if let Some(close_bracket) = after_tag.find('\u003e') {\n            let script_start = start + close_bracket + 1;\n            if let Some(end) = remaining[script_start..].find(\"\u003c/script\u003e\") {\n                scripts.push_str(\u0026remaining[script_start..script_start + end]);\n                scripts.push('\\n');\n                remaining = \u0026remaining[script_start + end + 9..];\n                continue;\n            }\n        }\n        break;\n    }\n\n    if scripts.is_empty() {\n        None\n    } else {\n        Some(scripts)\n    }\n}\n\n/// Read devDependencies from package.json\nfn read_dev_dependencies(root: \u0026Path) -\u003e HashSet\u003cString\u003e {\n    let pkg_json = root.join(\"package.json\");\n    let mut dev_deps = HashSet::new();\n\n    if let Ok(content) = std::fs::read_to_string(\u0026pkg_json) {\n        if let Ok(parsed) = serde_json::from_str::\u003cserde_json::Value\u003e(\u0026content) {\n            if let Some(deps) = parsed[\"devDependencies\"].as_object() {\n                for key in deps.keys() {\n                    dev_deps.insert(key.clone());\n                }\n            }\n        }\n    }\n\n    dev_deps\n}\n\n#[cfg(test)]\nmod tests {\n    use super::*;\n\n    #[test]\n    fn test_extract_package_from_module() {\n        assert_eq!(extract_package_from_module(\"lodash\"), Some(\"lodash\".into()));\n        assert_eq!(\n            extract_package_from_module(\"@scope/pkg\"),\n            Some(\"@scope/pkg\".into())\n        );\n        assert_eq!(\n            extract_package_from_module(\"@scope/pkg/sub/path\"),\n            Some(\"@scope/pkg\".into())\n        );\n        assert_eq!(extract_package_from_module(\"./relative\"), None);\n        assert_eq!(extract_package_from_module(\"../parent\"), None);\n        assert_eq!(extract_package_from_module(\"$lib/utils\"), None);\n    }\n\n    #[test]\n    fn test_extract_script_block() {\n        let svelte = r#\"\n\u003cscript lang=\"ts\"\u003e\n  import { onMount } from 'svelte';\n  import { db } from '$lib/db';\n\u003c/script\u003e\n\n\u003ch1\u003eHello\u003c/h1\u003e\n\n\u003cscript context=\"module\"\u003e\n  import { load } from '@sveltejs/kit';\n\u003c/script\u003e\n\"#;\n        let scripts = extract_script_block(svelte).unwrap();\n        assert!(scripts.contains(\"import { onMount }\"));\n        assert!(scripts.contains(\"import { load }\"));\n    }\n\n    #[test]\n    fn test_extract_script_block_no_script() {\n        let html = \"\u003ch1\u003eHello\u003c/h1\u003e\";\n        assert!(extract_script_block(html).is_none());\n    }\n\n    #[test]\n    fn test_extract_imports_from_js() {\n        let mut parser = Parser::new();\n        parser\n            .set_language(\u0026tree_sitter_javascript::LANGUAGE.into())\n            .unwrap();\n\n        let mut packages = HashSet::new();\n        let mut locations = HashMap::new();\n\n        let code = r#\"\nimport { createClient } from '@supabase/supabase-js';\nimport lodash from 'lodash';\nconst fs = require('fs');\nimport('./dynamic-package');\nimport './relative-file';\n\"#;\n\n        extract_imports_ts(\u0026mut parser, code, \"test.js\", \u0026mut packages, \u0026mut locations);\n\n        assert!(packages.contains(\"@supabase/supabase-js\"));\n        assert!(packages.contains(\"lodash\"));\n        assert!(packages.contains(\"fs\"));\n        assert!(!packages.contains(\"./relative-file\"));\n        // 3 confirmed: supabase, lodash, fs. Dynamic import may not be captured.\n        assert!(packages.len() \u003e= 3);\n    }\n\n    #[test]\n    fn test_scan_app_imports_empty_dir() {\n        let dir = tempfile::TempDir::new().unwrap();\n        let imports = scan_app_imports(dir.path());\n        assert!(imports.packages.is_empty());\n    }\n}\n","traces":[{"line":24,"address":[],"length":0,"stats":{"Line":1}},{"line":25,"address":[],"length":0,"stats":{"Line":2}},{"line":26,"address":[],"length":0,"stats":{"Line":3}},{"line":28,"address":[],"length":0,"stats":{"Line":2}},{"line":29,"address":[],"length":0,"stats":{"Line":1}},{"line":30,"address":[],"length":0,"stats":{"Line":2}},{"line":33,"address":[],"length":0,"stats":{"Line":2}},{"line":34,"address":[],"length":0,"stats":{"Line":1}},{"line":35,"address":[],"length":0,"stats":{"Line":2}},{"line":39,"address":[],"length":0,"stats":{"Line":3}},{"line":42,"address":[],"length":0,"stats":{"Line":5}},{"line":43,"address":[],"length":0,"stats":{"Line":20}},{"line":44,"address":[],"length":0,"stats":{" #[derive(Debug, Deserialize)]\n#[allow(dead_code)]\npub struct RuleDef {\n    pub id: String,\n    pub name: String,\n    pub severity: String,\n    #[serde(default)]\n    pub description: String,\n    #[serde(default)]\n    pub category: String,\n    #[serde(default)]\n    pub references: Vec\u003cString\u003e,\n    #[serde(rename = \"match\")]\n    pub match_config: MatchConfig,\n}\n\n#[derive(Debug, Deserialize)]\n#[allow(dead_code)]\npub struct MatchConfig {\n    #[serde(default)]\n    pub file_patterns: Vec\u003cString\u003e,\n    #[serde(default)]\n    pub content_patterns: Vec\u003cString\u003e,\n    #[serde(default)]\n    pub scan_directories: Vec\u003cString\u003e,\n}\n\nimpl RuleDef {\n    #[allow(dead_code)]\n    pub fn severity(\u0026self) -\u003e Severity {\n        match self.severity.to_lowercase().as_str() {\n            \"critical\" =\u003e Severity::Critical,\n            \"high\" =\u003e Severity::High,\n            \"medium\" =\u003e Severity::Medium,\n            \"low\" =\u003e Severity::Low,\n            _ =\u003e Severity::Medium,\n        }\n    }\n}\n\n/// Load all external rules from project and global directories\npub fn load_external_rules(root: \u0026Path) -\u003e Vec\u003cRuleDef\u003e {\n    let mut rules = Vec::new();\n\n    // Project-level rules\n    let project_dir = root.join(RULES_DIR);\n    if project_dir.exists() {\n        load_rules_from_dir(\u0026project_dir, \u0026mut rules);\n    }\n\n    // Global rules\n    if let Some(home) = dirs_home() {\n        let global_dir = home.join(GLOBAL_RULES_DIR);\n        if global_dir.exists() {\n            load_rules_from_dir(\u0026global_dir, \u0026mut rules);\n        }\n    }\n\n    rules\n}\n\nfn load_rules_from_dir(dir: \u0026Path, rules: \u0026mut Vec\u003cRuleDef\u003e) {\n    let entries = match std::fs::read_dir(dir) {\n        Ok(e) =\u003e e,\n        Err(_) =\u003e return,\n    };\n\n    for entry in entries.flatten() {\n        let path = entry.path();\n        if path.extension().and_then(|e| e.to_str()) != Some(\"toml\") {\n            continue;\n        }\n\n        match load_rule_file(\u0026path) {\n            Ok(rule) =\u003e rules.push(rule),\n            Err(e) =\u003e eprintln!(\"Warning: failed to load rule {}: {e}\", path.display()),\n        }\n    }\n}\n\nfn load_rule_file(path: \u0026Path) -\u003e anyhow::Result\u003cRuleDef\u003e {\n    let content = std::fs::read_to_string(path).context(\"Failed to read rule file\")?;\n    let rule_file: RuleFile = toml::from_str(\u0026content).context(\"Failed to parse rule file\")?;\n    Ok(rule_file.rule)\n}\n\n/// Apply external rules against scanned files, returning findings\n#[allow(dead_code)]\npub fn apply_rules(rules: \u0026[RuleDef], root: \u0026Path) -\u003e Vec\u003cFinding\u003e {\n    let mut findings = Vec::new();\n\n    for rule in rules {\n        let compiled_patterns: Vec\u003cRegex\u003e = rule\n            .match_config\n            .content_patterns\n            .iter()\n            .filter_map(|p| Regex::new(p).ok())\n            .collect();\n\n        if compiled_patterns.is_empty() {\n            continue;\n        }\n\n        // Determine which directories to scan\n        let scan_dirs: Vec\u003cPathBuf\u003e = if rule.match_config.scan_directories.is_empty() {\n            vec![root.to_path_buf()]\n        } else {\n            rule.match_config\n                .scan_directories\n                .iter()\n                .map(|d| root.join(d))\n                .filter(|p| p.exists())\n                .collect()\n        };\n\n        for dir in \u0026scan_dirs {\n            for entry in walkdir::WalkDir::new(dir)\n                .into_iter()\n                .filter_map(|e| e.ok())\n                .filter(|e| e.file_type().is_file())\n            {\n                let path = entry.path();\n\n                // Check file pattern match\n                if !rule.match_config.file_patterns.is_empty() {\n                    let filename = path.file_name().and_then(|n| n.to_str()).unwrap_or(\"\");\n                    let matches_pattern = rule.match_config.file_patterns.iter().any(|pattern| {\n                        if let Some(ext) = pattern.strip_prefix(\"*.\") {\n                            filename.ends_with(\u0026format!(\".{ext}\"))\n                        } else {\n                            filename == pattern\n                        }\n                    });\n                    if !matches_pattern {\n                        continue;\n                    }\n                }\n\n                let content = match std::fs::read_to_string(path) {\n                    Ok(c) =\u003e c,\n                    Err(_) =\u003e continue,\n                };\n\n                let rel_path = path\n                    .strip_prefix(root)\n                    .unwrap_or(path)\n                    .to_string_lossy()\n                    .to_string();\n\n                for (line_num, line) in content.lines().enumerate() {\n                    for re in \u0026compiled_patterns {\n                        if re.is_match(line) {\n                            findings.push(Finding {\n                                rule_id: rule.id.clone(),\n                                severity: rule.severity(),\n                                message: format!(\"{}: {}\", rule.name, line.trim()),\n                                file: Some(rel_path.clone()),\n                                line: Some(line_num + 1),\n                                suggestion: if rule.description.is_empty() {\n                                    None\n                                } else {\n                                    Some(rule.description.clone())\n                                },\n                                confidence: None,\n                                package: None,\n                                reachable: None,\n                                auto_fixable: false,\n                            });\n                            break; // One match per line per rule\n                        }\n                    }\n                }\n            }\n        }\n    }\n\n    findings\n}\n\n/// List all active rules (built-in + external)\npub fn list_rules(root: \u0026Path) {\n    let external = load_external_rules(root);\n\n    println!(\"Built-in rules:\");\n    println!(\"  DEPSEC-W001..W005  Workflow security (5 rules)\");\n    println!(\"  DEPSEC-P001..P012  Malicious patterns (10 rules)\");\n    println!(\"  DEPSEC-S001..S020  Secret detection (20 rules)\");\n    println!(\"  DEPSEC-H001..H004  Repo hygiene (4 rules)\");\n    println!(\"  DEPSEC-T001..T007  Trust/metadata (7 rules)\");\n    println!(\"  DEPSEC-V:*         Vulnerability advisories (live from OSV)\");\n    println!(\"  DEPSEC-MAL:*       Malicious packages (live from OSV)\");\n    println!();\n\n    if external.is_empty() {\n        println!(\"External rules: none\");\n        println!(\"  Add rules to {} or run 'depsec rules update'\", RULES_DIR);\n    } else {\n        println!(\"External rules ({}):\", external.len());\n        for rule in \u0026external {\n            println!(\n                \"  {}  {} [{}]\",\n                rule.id,\n                rule.name,\n                rule.severity.to_uppercase()\n            );\n        }\n    }\n}\n\n/// Update rules from community repository\npub fn update_rules(root: \u0026Path) -\u003e anyhow::Result\u003cusize\u003e {\n    let rules_dir = root.join(RULES_DIR);\n    std::fs::create_dir_all(\u0026rules_dir).context(\"Failed to create rules directory\")?;\n\n    let agent = ureq::AgentBuilder::new()\n        .timeout_read(std::time::Duration::from_secs(15))\n        .user_agent(\"depsec\")\n        .build();\n\n    // Try to fetch the community rules index\n    let resp = match agent.get(COMMUNITY_REPO_URL).call() {\n        Ok(r) =\u003e r,\n        Err(e) =\u003e {\n            anyhow::bail!(\"Failed to fetch rules from community repo: {e}\");\n        }\n    };\n\n    let entries: Vec\u003cserde_json::Value\u003e = resp.into_json().context(\"Failed to parse response\")?;\n\n    let mut count = 0;\n    for entry in \u0026entries {\n        let name = entry[\"name\"].as_str().unwrap_or(\"\");\n        let download_url = entry[\"download_url\"].as_str().unwrap_or(\"\");\n\n        if !name.ends_with(\".toml\") || download_url.is_empty() {\n            continue;\n        }\n\n        match agent.get(download_url).call() {\n            Ok(resp) =\u003e {\n                let content: String = resp.into_string().context(\"Failed to read rule content\")?;\n                // Validate it parses\n                if toml::from_str::\u003cRuleFile\u003e(\u0026content).is_ok() {\n                    let rule_path = rules_dir.join(name);\n                    std::fs::write(\u0026rule_path, \u0026content)?;\n                    println!(\"  Updated: {name}\");\n                    count += 1;\n                } else {\n                    eprintln!(\"  Skipped {name}: invalid rule format\");\n                }\n            }\n            Err(e) =\u003e eprintln!(\"  Failed to download {name}: {e}\"),\n        }\n    }\n\n    Ok(count)\n}\n\n/// Add a custom rule file to the project\npub fn add_rule(root: \u0026Path, rule_path: \u0026Path) -\u003e anyhow::Result\u003c()\u003e {\n    // Validate the rule first\n    let _rule = load_rule_file(rule_path)?;\n\n    let rules_dir = root.join(RULES_DIR);\n    std::fs::create_dir_all(\u0026rules_dir)?;\n\n    let filename = rule_path.file_name().context(\"Invalid rule file path\")?;\n    let dest = rules_dir.join(filename);\n    std::fs::copy(rule_path, \u0026dest)?;\n\n    println!(\"Rule added: {}\", dest.display());\n    Ok(())\n}\n\nfn dirs_home() -\u003e Option\u003cPathBuf\u003e {\n    std::env::var(\"HOME\").ok().map(PathBuf::from)\n}\n\n#[cfg(test)]\nmod tests {\n    use super::*;\n    use std::fs;\n    use tempfile::TempDir;\n\n    #[test]\n    fn test_parse_rule_file() {\n        let nt_patterns = [\"exec\\\\(\"]\n\"#,\n        )\n        .unwrap();\n\n        // JS file should NOT match\n        fs::write(dir.path().join(\"test.js\"), \"exec(code)\").unwrap();\n        // Python file SHOULD match\n        fs::write(dir.path().join(\"test.py\"), \"exec(code)\").unwrap();\n\n        let rules = load_external_rules(dir.path());\n        let findings = apply_rules(\u0026rules, dir.path());\n        assert_eq!(findings.len(), 1);\n        assert!(findings[0].file.as_ref().unwrap().ends_with(\"test.py\"));\n    }\n}\n","traces":[{"line":47,"address":[],"length":0,"stats":{"Line":3}},{"line":48,"address":[],"length":0,"stats":{"Line":3}},{"line":49,"address":[],"length":0,"stats":{"Line":3}},{"line":50,"address":[],"length":0,"stats":{"Line":5}},{"line":51,"address":[],"length":0,"stats":{"Line":2}},{"line":52,"address":[],"length":0,"stats":{"Line":0}},{"line":53,"address":[],"length":0,"stats":{"Line":0}},{"line":59,"address":[],"length":0,"stats":{"Line":3}},{"line":60,"address":[],"length":0,"stats":{"Line":6}},{"line":63,"address":[],"length":0,"stats":{"Line":9}},{"line":64,"address":[],"length":0,"stats":{"Line":5}},{"line":65,"address":[],"length":0,"stats":{"Line":4}},{"line":69,"address":[],"length":0,"stats":{"Line":6}},{"line":70,"address":[],"length":0,"stats":{"Line":6}},{"line":71,"address":[],"length":0,"stats":{"Line":3}},{"line":72,"address":[],"length":0,"stats":{"Line":0}},{"line":76,"address":[],"length":0,"stats":{"Line":3}},{"line":79,"address":[],"length":0,"stats":{"Line":2}},{"line":80,"address":[],"length":0,"stats":{"Line":4}},{"line":81,"address":[],"length":0,"stats":{"Line":4}},{"line":82,"address":[],"length":0,"stats":{"Line":0}},{"line":85,"address":[],"length":0,"stats":{"Line":6}},{"line":86,"address":[],"length":0,"stats":{"Line":6}},{"line":87,"address":[],"length":0,"stats":{"Line":10}},{"line":88,"address":[],"length":0,"stats":{"Line":0}},{"line":91,"address":[],"length":0,"stats":{"Line":2}},{"line":92,"addres               SandboxType::None\n            }\n        }\n        \"sandbox-exec\" =\u003e {\n            if is_available(\"sandbox-exec\") {\n                SandboxType::SandboxExec\n            } else {\n                SandboxType::None\n            }\n        }\n        \"auto\" =\u003e {\n            // Try in order: bubblewrap → sandbox-exec → Docker\n            if cfg!(target_os = \"linux\") \u0026\u0026 is_available(\"bwrap\") {\n                SandboxType::Bubblewrap\n            } else if cfg!(target_os = \"macos\") \u0026\u0026 is_available(\"sandbox-exec\") {\n                SandboxType::SandboxExec\n            } else if is_docker_available() {\n                SandboxType::Docker\n            } else {\n                SandboxType::None\n            }\n        }\n        _ =\u003e SandboxType::None,\n    }\n}\n\n/// Run a command in a sandbox\npub fn run_sandboxed(\n    args: \u0026[String],\n    project_dir: \u0026Path,\n    sandbox_type: \u0026SandboxType,\n) -\u003e Result\u003cSandboxResult\u003e {\n    match sandbox_type {\n        SandboxType::Bubblewrap =\u003e run_bubblewrap(args, project_dir),\n        SandboxType::SandboxExec =\u003e run_sandbox_exec(args, project_dir),\n        SandboxType::Docker =\u003e run_docker(args, project_dir),\n        SandboxType::None =\u003e anyhow::bail!(\"No sandbox available\"),\n    }\n}\n\n/// Run in bubblewrap (Linux)\nfn run_bubblewrap(args: \u0026[String], project_dir: \u0026Path) -\u003e Result\u003cSandboxResult\u003e {\n    let home = std::env::var(\"HOME\").unwrap_or_else(|_| \"/root\".into());\n\n    // Use unified sensitive paths from watchdog\n    let sensitive_dirs: Vec\u003cString\u003e = crate::watchdog::SENSITIVE_PATHS\n        .iter()\n        .map(|p| format!(\"{home}/{p}\"))\n        .collect();\n\n    let mut cmd = Command::new(\"bwrap\");\n    cmd.args([\"--ro-bind\", \"/\", \"/\", \"--tmpfs\", \"/tmp\"]);\n\n    // Mask ALL sensitive dirs with tmpfs (unified with watchdog)\n    for dir in \u0026sensitive_dirs {\n        cmd.args([\"--tmpfs\", dir]);\n    }\n\n    cmd.args([\n        \"--bind\",\n        \u0026project_dir.to_string_lossy(),\n        \u0026project_dir.to_string_lossy(),\n        \"--dev\",\n        \"/dev\",\n        \"--proc\",\n        \"/proc\",\n        \"--unshare-pid\",\n        \"--die-with-parent\",\n        \"--\",\n    ]);\n    cmd.args(args);\n    cmd.current_dir(project_dir);\n\n    let status = cmd.status().context(\"Failed to run bubblewrap\")?;\n\n    Ok(SandboxResult {\n        sandbox_type: SandboxType::Bubblewrap,\n        exit_code: status.code().unwrap_or(-1),\n        success: status.success(),\n    })\n}\n\n/// Run in sandbox-exec (macOS)\nfn run_sandbox_exec(args: \u0026[String], project_dir: \u0026Path) -\u003e Result\u003cSandboxResult\u003e {\n    let home = std::env::var(\"HOME\").unwrap_or_else(|_| \"/Users/user\".into());\n\n    // Deny-by-default sandbox profile — block ALL sensitive path reads\n    let mut deny_rules = String::new();\n    for path in crate::watchdog::SENSITIVE_PATHS {\n        deny_rules.push_str(\u0026format!(\"(deny file-read* (subpath \\\"{home}/{path}\\\"))\\n\"));\n    }\n\n    let profile = format!(\n        r#\"(version 1)\n(allow default)\n{deny_rules}\n(allow file-write* (subpath \"{project_dir}\"))\n(allow file-write* (subpath \"/tmp\"))\n(allow file-write* (subpath \"/private/tmp\"))\"#,\n        deny_rules = deny_rules,\n        project_dir = project_dir.display(),\n    );\n\n    let mut cmd = Command::new(\"sandbox-exec\");\n    cmd.args([\"-p\", \u0026profile]);\n    cmd.args(args);\n    cmd.current_dir(project_dir);\n\n    let status = cmd.status().context(\"Failed to run sandbox-exec\")?;\n\n    Ok(SandboxResult {\n        sandbox_type: SandboxType::SandboxExec,\n        exit_code: status.code().unwrap_or(-1),\n        success: status.success(),\n    })\n}\n\n/// Run in Docker container\nfn run_docker(args: \u0026[String], project_dir: \u0026Path) -\u003e Result\u003cSandboxResult\u003e {\n    // Auto-detect Docker image based on package manager\n    let image = detect_docker_image(args);\n\n    let mut docker_args = vec![\n        \"run\".to_string(),\n        \"--rm\".to_string(),\n        \"-v\".to_string(),\n        format!(\"{}:/app:rw\", project_dir.display()),\n        \"-w\".to_string(),\n        \"/app\".to_string(),\n        image,\n    ];\n    docker_args.extend(args.iter().cloned());\n\n    let status = Command::new(\"docker\")\n        .args(\u0026docker_args)\n        .status()\n        .context(\"Failed to run Docker\")?;\n\n    Ok(SandboxResult {\n        sandbox_type: SandboxType::Docker,\n        exit_code: status.code().unwrap_or(-1),\n        success: status.success(),\n    })\n}\n\n/// Auto-detect Docker image based on the package manager command\nfn detect_docker_image(args: \u0026[String]) -\u003e String {\n    let cmd = args.first().map(|s| s.as_str()).unwrap_or(\"\");\n    match cmd {\n        \"npm\" | \"npx\" | \"yarn\" | \"pnpm\" =\u003e \"node:22-slim\".into(),\n        \"pip\" | \"pip3\" | \"python\" | \"python3\" | \"uv\" =\u003e \"python:3.12-slim\".into(),\n        \"cargo\" =\u003e \"rust:slim\".into(),\n        \"go\" =\u003e \"golang:1.22-alpine\".into(),\n        \"bundle\" | \"gem\" =\u003e \"ruby:3.3-slim\".into(),\n        _ =\u003e \"node:22-slim\".into(), // Default fallback\n    }\n}\n\n/// Check if a command is available on PATH\nfn is_available(cmd: \u0026str) -\u003e bool {\n    Command::new(\"which\")\n        .arg(cmd)\n        .output()\n        .map(|o| o.status.success())\n        .unwrap_or(false)\n}\n\n/// Check if Docker is available and the daemon is running\nfn is_docker_available() -\u003e bool {\n    if !is_available(\"docker\") {\n        return false;\n    }\n    Command::new(\"docker\")\n        .args([\"info\", \"--format\", \"{{.ServerVersion}}\"])\n        .output()\n        .map(|o| o.status.success())\n        .unwrap_or(false)\n}\n\n#[cfg(test)]\nmod tests {\n g.rule_id.clone()) {\n                rules.push(serde_json::json!({\n                    \"id\": finding.rule_id,\n                    \"shortDescription\": {\n                        \"text\": finding.message.chars().take(100).collect::\u003cString\u003e()\n                    },\n                    \"defaultConfiguration\": {\n                        \"level\": severity_to_sarif_level(\u0026finding.severity)\n                    }\n                }));\n            }\n\n            // Add result\n            let mut result = serde_json::json!({\n                \"ruleId\": finding.rule_id,\n                \"level\": severity_to_sarif_level(\u0026finding.severity),\n                \"message\": {\n                    \"text\": finding.message\n                }\n            });\n\n            // Add location if available\n            if let Some(ref file) = finding.file {\n                let mut region = serde_json::Map::new();\n                if let Some(line) = finding.line {\n                    region.insert(\"startLine\".into(), serde_json::json!(line));\n                }\n\n                result[\"locations\"] = serde_json::json!([{\n                    \"physicalLocation\": {\n                        \"artifactLocation\": {\n                            \"uri\": file\n                        },\n                        \"region\": region\n                    }\n                }]);\n            }\n\n            // Add fix suggestion\n            if let Some(ref suggestion) = finding.suggestion {\n                result[\"fixes\"] = serde_json::json!([{\n                    \"description\": {\n                        \"text\": suggestion\n                    }\n                }]);\n            }\n\n            results.push(result);\n        }\n    }\n\n    let sarif = serde_json::json!({\n        \"$schema\": \"https://raw.githubusercontent.com/oasis-tcs/sarif-spec/main/sarif-2.1/schema/sarif-schema-2.1.0.json\",\n        \"version\": \"2.1.0\",\n        \"runs\": [{\n            \"tool\": {\n                \"driver\": {\n                    \"name\": \"depsec\",\n                    \"version\": report.version,\n                    \"informationUri\": \"https://github.com/chocksy/depsec\",\n                    \"rules\": rules\n                }\n            },\n            \"results\": results\n        }]\n    });\n\n    Ok(serde_json::to_string_pretty(\u0026sarif)?)\n}\n\nfn severity_to_sarif_level(severity: \u0026Severity) -\u003e \u0026'static str {\n    match severity {\n        Severity::Critical | Severity::High =\u003e \"error\",\n        Severity::Medium =\u003e \"warning\",\n        Severity::Low =\u003e \"note\",\n    }\n}\n\n#[cfg(test)]\nmod tests {\n    use super::*;\n\n    #[test]\n    fn test_sarif_empty_report() {\n        let report = ScanReport::new(\"test\".into(), vec![]);\n        let sarif = render_sarif(\u0026report).unwrap();\n        let parsed: serde_json::Value = serde_json::from_str(\u0026sarif).unwrap();\n        assert_eq!(parsed[\"version\"], \"2.1.0\");\n        assert_eq!(parsed[\"runs\"][0][\"tool\"][\"driver\"][\"name\"], \"depsec\");\n        assert!(parsed[\"runs\"][0][\"results\"].as_array().unwrap().is_empty());\n    }\n\n    #[test]\n    fn test_sarif_with_findings() {\n        use crate::checks::{CheckResult, Finding};\n\n        let findings = vec![Finding {\n            rule_id: \"DEPSEC-W001\".into(),\n            severity: Severity::High,\n            message: \"Unpinned action\".into(),\n            file: Some(\".github/workflows/ci.yml\".into()),\n            line: Some(10),\n            suggestion: Some(\"Pin to SHA\".into()),\n            confidence: None,\n            package: None,\n            reachable: None,\n            auto_fixable: true,\n        }];\n\n        let results = vec![CheckResult::new(\"workflows\", findings, 25.0, vec![])];\n        let report = ScanReport::new(\"test\".into(), results);\n        let sarif = render_sarif(\u0026report).unwrap();\n        let parsed: serde_json::Value = serde_json::from_str(\u0026sarif).unwrap();\n\n        let result = \u0026parsed[\"runs\"][0][\"results\"][0];\n        assert_eq!(result[\"ruleId\"], \"DEPSEC-W001\");\n        assert_eq!(result[\"level\"], \"error\");\n        assert_eq!(\n            result[\"locations\"][0][\"physicalLocation\"][\"artifactLocation\"][\"uri\"],\n            \".github/workflows/ci.yml\"\n        );\n        assert_eq!(\n            result[\"locations\"][0][\"physicalLocation\"][\"region\"][\"startLine\"],\n            10\n        );\n    }\n\n    #[test]\n    fn test_severity_mapping() {\n        assert_eq!(severity_to_sarif_level(\u0026Severity::Critical), \"error\");\n        assert_eq!(severity_to_sarif_level(\u0026Severity::High), \"error\");\n        assert_eq!(severity_to_sarif_level(\u0026Severity::Medium), \"warning\");\n        assert_eq!(severity_to_sarif_level(\u0026Severity::Low), \"note\");\n    }\n}\n","traces":[{"line":5,"address":[],"length":0,"stats":{"Line":2}},{"line":6,"address":[],"length":0,"stats":{"Line":4}},{"line":7,"address":[],"length":0,"stats":{"Line":4}},{"line":8,"address":[],"length":0,"stats":{"Line":4}},{"line":10,"address":[],"length":0,"stats":{"Line":3}},{"line":11,"address":[],"length":0,"stats":{"Line":2}},{"line":13,"address":[],"length":0,"stats":{"Line":5}},{"line":14,"address":[],"length":0,"stats":{"Line":4}},{"line":15,"address":[],"length":0,"stats":{"Line":2}},{"line":16,"address":[],"length":0,"stats":{"Line":2}},{"line":17,"address":[],"length":0,"stats":{"Line":5}},{"line":19,"address":[],"length":0,"stats":{"Line":2}},{"line":20,"address":[],"length":0,"stats":{"Line":2}},{"line":26,"address":[],"length":0,"stats":{"Line":2}},{"line":27,"address":[],"length":0,"stats":{"Line":1}},{"line":28,"address":[],"length":0,"stats":{"Line":3}},{"line":29,"address":[],"length":0,"stats":{"Line":1}},{"line":30,"address":[],"length":0,"stats":{"Line":1}},{"line":35,"address":[],"length":0,"stats":{ \n    let cargo_toml = root.join(\"Cargo.toml\");\n    if cargo_toml.exists() {\n        if let Ok(content) = std::fs::read_to_string(\u0026cargo_toml) {\n            if let Ok(parsed) = content.parse::\u003ctoml::Table\u003e() {\n                if let Some(pkg) = parsed.get(\"package\").and_then(|p| p.as_table()) {\n                    if let Some(name) = pkg.get(\"name\").and_then(|n| n.as_str()) {\n                        return name.to_string();\n                    }\n                }\n            }\n        }\n    }\n\n    // Try package.json\n    let package_json = root.join(\"package.json\");\n    if package_json.exists() {\n        if let Ok(content) = std::fs::read_to_string(\u0026package_json) {\n            if let Ok(parsed) = serde_json::from_str::\u003cserde_json::Value\u003e(\u0026content) {\n                if let Some(name) = parsed.get(\"name\").and_then(|n| n.as_str()) {\n                    return name.to_string();\n                }\n            }\n        }\n    }\n\n    // Fallback to directory name\n    root.file_name()\n        .and_then(|n| n.to_str())\n        .unwrap_or(\"unknown\")\n        .to_string()\n}\n\npub fn run_scan(\n    root: \u0026Path,\n    config: \u0026Config,\n    check_filter: Option\u003c\u0026[String]\u003e,\n) -\u003e anyhow::Result\u003cScanReport\u003e {\n    let ctx = ScanContext { root, config };\n\n    let all_checks: Vec\u003cBox\u003cdyn Check\u003e\u003e = vec![\n        Box::new(crate::checks::workflows::WorkflowsCheck),\n        Box::new(crate::checks::deps::DepsCheck),\n        Box::new(crate::checks::patterns::PatternsCheck),\n        Box::new(crate::checks::secrets::SecretsCheck),\n        Box::new(crate::checks::hygiene::HygieneCheck),\n    ];\n\n    let enabled = \u0026config.checks.enabled;\n\n    let mut results: Vec\u003cCheckResult\u003e = Vec::new();\n\n    for check in \u0026all_checks {\n        let name = check.name();\n\n        // Filter by --checks flag if provided\n        if let Some(filter) = check_filter {\n            if !filter.iter().any(|f| f == name) {\n                continue;\n            }\n        }\n\n        // Filter by config enabled list\n        if !enabled.iter().any(|e| e == name) {\n            continue;\n        }\n\n        match check.run(\u0026ctx) {\n            Ok(result) =\u003e results.push(result),\n            Err(e) =\u003e {\n                eprintln!(\"Error running {name} check: {e}\");\n                return Err(e);\n            }\n        }\n    }\n\n    let project_name = detect_project_name(root);\n    Ok(ScanReport::new(project_name, results))\n}\n\n#[cfg(test)]\nmod tests {\n    use super::*;\n    use std::fs;\n    use tempfile::TempDir;\n\n    fn temp_project() -\u003e TempDir {\n        TempDir::new().unwrap()\n    }\n\n    #[test]\n    fn test_detect_project_name_cargo() {\n        let dir = temp_project();\n        fs::write(\n            dir.path().join(\"Cargo.toml\"),\n            \"[package]\\nname = \\\"my-rust-app\\\"\\nversion = \\\"0.1.0\\\"\\nedition = \\\"2021\\\"\\n\",\n        )\n        .unwrap();\n        assert_eq!(detect_project_name(dir.path()), \"my-rust-app\");\n    }\n\n    #[test]\n    fn test_detect_project_name_package_json() {\n        let dir = temp_project();\n        fs::write(\n            dir.path().join(\"package.json\"),\n            r#\"{\"name\": \"my-node-app\", \"version\": \"1.0.0\"}\"#,\n        )\n        .unwrap();\n        assert_eq!(detect_project_name(dir.path()), \"my-node-app\");\n    }\n\n    #[test]\n    fn test_detect_project_name_fallback() {\n        let dir = temp_project();\n        let name = detect_project_name(dir.path());\n        // tempdir names are random, just verify it's not empty\n        assert!(!name.is_empty());\n    }\n\n    #[test]\n    fn test_run_scan_empty_project() {\n        let dir = temp_project();\n        let config = Config::default();\n        let report = run_scan(dir.path(), \u0026config, None).unwrap();\n        assert!(!repo
