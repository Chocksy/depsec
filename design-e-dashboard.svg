<svg xmlns="http://www.w3.org/2000/svg" width="520" height="380" viewBox="0 0 520 380">
  <defs>
    <linearGradient id="cardBg" x1="0" y1="0" x2="0.3" y2="1">
      <stop offset="0%" stop-color="#1c1028"/>
      <stop offset="50%" stop-color="#151520"/>
      <stop offset="100%" stop-color="#111118"/>
    </linearGradient>
    <linearGradient id="borderGlow" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#6366f1" stop-opacity="0.4"/>
      <stop offset="50%" stop-color="#a855f7" stop-opacity="0.2"/>
      <stop offset="100%" stop-color="#ec4899" stop-opacity="0.3"/>
    </linearGradient>
    <linearGradient id="gaugeGreen" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#22c55e"/>
      <stop offset="100%" stop-color="#4ade80"/>
    </linearGradient>
    <linearGradient id="gaugeYellow" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#eab308"/>
      <stop offset="100%" stop-color="#facc15"/>
    </linearGradient>
    <linearGradient id="gaugeRed" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#ef4444"/>
      <stop offset="100%" stop-color="#f87171"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="2" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- Outer background -->
  <rect width="520" height="380" rx="16" fill="#0a0a0f"/>

  <!-- Card with glow border -->
  <rect x="2" y="2" width="516" height="376" rx="15" fill="none" stroke="url(#borderGlow)" stroke-width="1.5"/>
  <rect x="3" y="3" width="514" height="374" rx="14" fill="url(#cardBg)"/>

  <!-- Project name -->
  <text x="32" y="46" font-size="20" fill="#f1f5f9" font-family="SF Mono, JetBrains Mono, Menlo, monospace" font-weight="700">depsec</text>
  <text x="32" y="66" font-size="12" fill="#6b7280" font-family="Inter, system-ui, sans-serif">Supply Chain Security Scanner · v0.2.0</text>

  <!-- Gauge -->
  <!-- Background arc -->
  <path d="M 420 62 A 38 38 0 0 1 496 62" fill="none" stroke="#1e2130" stroke-width="6" stroke-linecap="round"/>
  <!-- Green segment (0-60%) -->
  <path d="M 420 62 A 38 38 0 0 1 458 28" fill="none" stroke="url(#gaugeGreen)" stroke-width="6" stroke-linecap="round" filter="url(#glow)"/>
  <!-- Yellow segment (60-80%) -->
  <path d="M 458 28 A 38 38 0 0 1 480 32" fill="none" stroke="url(#gaugeYellow)" stroke-width="6" stroke-linecap="round"/>
  <!-- Red segment (80-100%) -->
  <path d="M 480 32 A 38 38 0 0 1 496 62" fill="none" stroke="url(#gaugeRed)" stroke-width="6" stroke-linecap="round"/>
  <!-- Needle dot - at green position for score 10 -->
  <circle cx="428" cy="42" r="4" fill="#22c55e" filter="url(#glow)"/>
  <!-- Score text -->
  <text x="458" y="58" font-size="18" fill="#f1f5f9" font-family="SF Mono, Menlo, monospace" font-weight="700" text-anchor="middle">10.0</text>

  <!-- Divider -->
  <line x1="32" y1="86" x2="488" y2="86" stroke="#1e2130" stroke-width="1"/>

  <!-- Stat blocks -->
  <text x="32" y="122" font-size="28" fill="#f1f5f9" font-family="SF Mono, Menlo, monospace" font-weight="700">129</text>
  <text x="32" y="140" font-size="11" fill="#6b7280" font-family="Inter, system-ui, sans-serif">packages</text>

  <text x="152" y="122" font-size="28" fill="#f1f5f9" font-family="SF Mono, Menlo, monospace" font-weight="700">47</text>
  <text x="152" y="140" font-size="11" fill="#6b7280" font-family="Inter, system-ui, sans-serif">files scanned</text>

  <text x="280" y="122" font-size="28" fill="#f1f5f9" font-family="SF Mono, Menlo, monospace" font-weight="700">46</text>
  <text x="280" y="140" font-size="11" fill="#6b7280" font-family="Inter, system-ui, sans-serif">rules applied</text>

  <text x="400" y="122" font-size="28" fill="#22c55e" font-family="SF Mono, Menlo, monospace" font-weight="700">0</text>
  <text x="400" y="140" font-size="11" fill="#6b7280" font-family="Inter, system-ui, sans-serif">findings</text>

  <!-- Divider -->
  <line x1="32" y1="158" x2="488" y2="158" stroke="#1e2130" stroke-width="1"/>

  <!-- Category bars -->
  <!-- Workflows -->
  <text x="32" y="186" font-size="12" fill="#94a3b8" font-family="Inter, system-ui, sans-serif" font-weight="500">Workflows</text>
  <text x="488" y="186" font-size="12" fill="#4ade80" font-family="SF Mono, Menlo, monospace" font-weight="600" text-anchor="end">25/25</text>
  <rect x="32" y="194" width="456" height="5" rx="2.5" fill="#1e2130"/>
  <rect x="32" y="194" width="456" height="5" rx="2.5" fill="#22c55e" fill-opacity="0.8"/>

  <!-- Dependencies -->
  <text x="32" y="224" font-size="12" fill="#94a3b8" font-family="Inter, system-ui, sans-serif" font-weight="500">Dependencies</text>
  <text x="488" y="224" font-size="12" fill="#4ade80" font-family="SF Mono, Menlo, monospace" font-weight="600" text-anchor="end">20/20</text>
  <rect x="32" y="232" width="456" height="5" rx="2.5" fill="#1e2130"/>
  <rect x="32" y="232" width="456" height="5" rx="2.5" fill="#22c55e" fill-opacity="0.8"/>

  <!-- Patterns -->
  <text x="32" y="262" font-size="12" fill="#94a3b8" font-family="Inter, system-ui, sans-serif" font-weight="500">Patterns</text>
  <text x="488" y="262" font-size="12" fill="#4ade80" font-family="SF Mono, Menlo, monospace" font-weight="600" text-anchor="end">10/10</text>
  <rect x="32" y="270" width="456" height="5" rx="2.5" fill="#1e2130"/>
  <rect x="32" y="270" width="456" height="5" rx="2.5" fill="#22c55e" fill-opacity="0.8"/>

  <!-- Secrets -->
  <text x="32" y="300" font-size="12" fill="#94a3b8" font-family="Inter, system-ui, sans-serif" font-weight="500">Secrets</text>
  <text x="488" y="300" font-size="12" fill="#4ade80" font-family="SF Mono, Menlo, monospace" font-weight="600" text-anchor="end">25/25</text>
  <rect x="32" y="308" width="456" height="5" rx="2.5" fill="#1e2130"/>
  <rect x="32" y="308" width="456" height="5" rx="2.5" fill="#22c55e" fill-opacity="0.8"/>

  <!-- Hygiene -->
  <text x="32" y="338" font-size="12" fill="#94a3b8" font-family="Inter, system-ui, sans-serif" font-weight="500">Hygiene</text>
  <text x="488" y="338" font-size="12" fill="#4ade80" font-family="SF Mono, Menlo, monospace" font-weight="600" text-anchor="end">10/10</text>
  <rect x="32" y="346" width="456" height="5" rx="2.5" fill="#1e2130"/>
  <rect x="32" y="346" width="456" height="5" rx="2.5" fill="#22c55e" fill-opacity="0.8"/>

  <!-- Footer -->
  <text x="32" y="372" font-size="10" fill="#374151" font-family="Inter, system-ui, sans-serif">github.com/chocksy/depsec</text>
  <text x="488" y="372" font-size="10" fill="#374151" font-family="Inter, system-ui, sans-serif" text-anchor="end">Own your security</text>
</svg>
