name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  test:
    name: Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
      - uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8 # stable
      - uses: Swatinem/rust-cache@23869a5bd66c73db3c0ac40331f3206eb23791dc # v2.9.1

      - name: Check formatting
        run: cargo fmt --check

      - name: Run clippy
        run: cargo clippy -- -D warnings

      - name: Run tests
        run: cargo test

      - name: Check unused dependencies
        run: |
          cargo install cargo-machete --locked
          cargo machete

  # Self-scan (dogfooding) — runs after build
  security:
    name: Security Scan
    runs-on: ubuntu-latest
    needs: test
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
      - uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8 # stable
      - uses: Swatinem/rust-cache@23869a5bd66c73db3c0ac40331f3206eb23791dc # v2.9.1

      - name: Audit own dependencies (cargo-deny)
        run: |
          cargo install cargo-deny --locked
          cargo deny check

      - name: Build depsec
        run: cargo build --release

      - name: Start network monitor
        run: |
          sudo tcpdump -i any -nn -q -l 2>/dev/null > /tmp/depsec-raw.pcap &
          echo $! > /tmp/depsec-tcpdump.pid

      - name: Run depsec on itself (static scan)
        run: ./target/release/depsec scan . --no-color

      - name: Stop network monitor and check baseline
        if: always()
        run: |
          if [ -f /tmp/depsec-tcpdump.pid ]; then
            sudo kill "$(cat /tmp/depsec-tcpdump.pid)" 2>/dev/null || true
            sleep 2
          fi
          # Extract unique IPs from raw capture, do reverse DNS where possible
          grep -oP '\d+\.\d+\.\d+\.\d+' /tmp/depsec-raw.pcap 2>/dev/null | sort -u > /tmp/depsec-ips.txt
          # Try reverse DNS for each IP
          > /tmp/depsec-capture.txt
          while read -r ip; do
            host=$(dig +short -x "$ip" 2>/dev/null | head -1 | sed 's/\.$//')
            if [ -n "$host" ]; then
              echo "$host" >> /tmp/depsec-capture.txt
            else
              echo "$ip" >> /tmp/depsec-capture.txt
            fi
          done < /tmp/depsec-ips.txt
          sort -u -o /tmp/depsec-capture.txt /tmp/depsec-capture.txt

          echo "=== Captured network connections ==="
          cat /tmp/depsec-capture.txt 2>/dev/null || echo "No connections captured"
          echo "=== Baseline check ==="
          if [ -f depsec.baseline.json ]; then
            ./target/release/depsec baseline check --capture /tmp/depsec-capture.txt --no-color || true
          else
            echo "No baseline file — skipping network check"
          fi
